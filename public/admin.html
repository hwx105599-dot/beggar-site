<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>旅行雲端管理版 v29</title>
<style>
:root{--p:#0f766e;--bg:#f4f7f7;--text:#1f2937;--muted:#667085;--line:#e5e7eb;--danger:#b42318}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text)}
.wrap,.app{max-width:900px;margin:auto;padding:18px 16px 96px}.card{background:white;border-radius:18px;box-shadow:0 4px 18px rgba(15,23,42,.06);overflow:hidden;margin-bottom:14px}.content{padding:15px}
h1{font-size:30px;margin:10px 0 16px}h2{margin:0 0 12px}.muted{color:#667085;font-size:14px;line-height:1.6}.warn{background:#fff7ed;color:#9a3412;padding:10px;border-radius:12px;font-size:13px;margin:8px 0;white-space:pre-wrap}.success{background:#ecfdf3;color:#067647;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}
button,.btn{border:0;border-radius:11px;padding:10px 12px;font-weight:800;cursor:pointer}.primary{background:var(--p);color:white}.soft{background:#eef7f6;color:var(--p)}.danger{background:#fee4e2;color:#b42318}.gray{background:#f2f4f7;color:#344054}.orange{background:#fff7ed;color:#9a3412}.smallBtn{font-size:12px;padding:7px 10px}
input,textarea,select{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:10px;margin:5px 0 10px;font:inherit}textarea{min-height:76px}label{font-size:13px;font-weight:800;color:#344054}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0}.adminTab,.tab{background:white;color:#667085}.adminTab.active,.tab.active{background:var(--p);color:white}.panel,.screen{display:none}.panel.active,.screen.active{display:block}
.item{border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-top:10px;background:#fff}.listrow{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.status,.badge{font-size:12px;padding:4px 8px;border-radius:999px;background:#f2f4f7;color:#344054;display:inline-block;margin:2px}.codeText{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f2f4f7;padding:3px 8px;border-radius:8px}
.pick{display:flex;justify-content:center;align-items:center;height:72px;border:2px dashed #99d6cc;border-radius:14px;background:#f0fdfa;color:var(--p);font-weight:900;cursor:pointer}.preview{width:100%;max-height:260px;object-fit:cover;border-radius:12px;background:#edf2f7;margin:8px 0;display:none}.thumb{width:90px;height:62px;object-fit:cover;border-radius:8px;background:#edf2f7}.galleryPreview,.gallery{display:flex;gap:8px;overflow-x:auto;margin:8px 0}.galleryPreview img,.gallery img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}
.hero{height:280px;background:#0f766e center/cover no-repeat;position:relative}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.72))}.heroText{position:absolute;left:20px;right:20px;bottom:22px;color:white;z-index:1}.heroText h1{margin:0 0 6px;color:white}
nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:20}.navin{max-width:900px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.navin .tab{background:white;padding:8px 4px}
.card img.cover{width:100%;height:220px;object-fit:cover;background:#edf2f7}.sectionTitle{font-size:22px;margin:16px 4px 10px}.empty{padding:20px;color:#667085}
.modalMask{position:fixed;inset:0;background:rgba(15,23,42,.58);z-index:99;display:none;align-items:flex-end;justify-content:center}.modalMask.active{display:flex}.modal{background:white;width:min(900px,100%);max-height:88vh;overflow:auto;border-radius:22px 22px 0 0}.modal img{width:100%;height:260px;object-fit:cover;background:#edf2f7}.modalContent{padding:16px 16px 28px}.modalHeader{display:flex;justify-content:space-between}.close{border-radius:999px;background:#f2f4f7;color:#344054}
.feedbackBox,.noticeCard{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-top:12px}.stars{display:flex;gap:6px;margin:8px 0}.starBtn{font-size:22px;background:#eef7f6;color:#667085;padding:6px 9px}.starBtn.active{background:var(--p);color:white}.likeRow{display:flex;gap:8px;margin:8px 0}.likeRow button.active{outline:2px solid var(--p)}.announcementBody{white-space:pre-wrap}.pollOption{border:1px solid #e5e7eb;border-radius:12px;padding:10px;margin:8px 0}.pollBar{height:8px;background:#e7f8f5;border-radius:999px;overflow:hidden;margin-top:6px}.pollBar span{display:block;height:100%;background:var(--p)}
.loginBox{max-width:520px;margin:26px auto}.logoutBar{position:fixed;right:8px;top:8px;z-index:30}.downloadBox{padding:14px}.detailBox{display:none;border-top:1px solid #e5e7eb;margin-top:10px;padding-top:10px}.detailBox.show{display:block}
@media(max-width:760px){.grid2{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}.listrow{display:block}.navin{grid-template-columns:repeat(5,1fr)}.wrap,.app{padding-left:12px;padding-right:12px}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>旅行雲端管理版｜v29 穩定版</h1>
  <div id="currentTripTitle" class="success">尚未選擇旅程</div>

  <div class="card content">
    <h2>旅程密碼與開放時間</h2>
    <div class="grid2">
      <div><label>旅程密碼</label><input id="quickAccessCode" placeholder="例如：xiamen2026"></div>
      <div><label>是否公開觀看</label><select id="quickPublicEnabled"><option value="true">公開</option><option value="false">關閉</option></select></div>
      <div><label>開放開始日期時間</label><input id="quickOpenAt" type="datetime-local"></div>
      <div><label>開放結束日期時間</label><input id="quickCloseAt" type="datetime-local"></div>
    </div>
    <div class="row">
      <button class="primary" id="saveTripQuickSettingsBtn">儲存密碼與時間</button>
      <button class="soft" id="clearTripTimeBtn">清除時間限制</button>
      <button class="primary" id="publishTripBtn">儲存並開放觀看版</button>
      <button class="orange" id="endTripBtn">結束旅程</button>
      <button class="danger" id="closePublicBtn">關閉公開</button>
      <button class="soft" id="demoDataBtn">加入測試資料</button>
    </div>
    <div class="muted">密碼、時間、公開狀態都可以在這裡修正，不會影響每日行程資料。</div>
  </div>

  <div class="tabs">
    <button class="adminTab active" data-panel="trips">我的旅程</button>
    <button class="adminTab" data-panel="site">首頁住宿</button>
    <button class="adminTab" data-panel="days">每日行程</button>
    <button class="adminTab" data-panel="foods">美食管理</button>
    <button class="adminTab" data-panel="bulletin">公佈欄</button>
    <button class="adminTab" data-panel="flights">航班資料</button>
  </div>

  <section id="trips" class="panel active">
    <div class="card content">
      <h2>建立新旅程</h2>
      <div class="grid2">
        <div><label>旅程名稱</label><input id="newTripName" placeholder="例如：廈門旅行"></div>
        <div><label>旅程代號</label><input id="newTripSlug" placeholder="例如：xiamen-20260711"></div>
        <div><label>目的地</label><input id="newTripDestination"></div>
        <div><label>旅程密碼</label><input id="newTripCode" placeholder="例如：xiamen2026"></div>
        <div><label>開始日期</label><input id="newTripStart" type="date"></div>
        <div><label>結束日期</label><input id="newTripEnd" type="date"></div>
        <div><label>開放開始時間</label><input id="newTripOpenAt" type="datetime-local"></div>
        <div><label>開放結束時間</label><input id="newTripCloseAt" type="datetime-local"></div>
      </div>
      <button class="primary" id="createTripBtn">＋ 建立新旅程</button>
      <button class="soft" id="reloadTripsBtn">重新讀取旅程</button>
      <div class="muted">如果沒有填旅程密碼，系統會自動用旅程代號當密碼。</div>
    </div>
    <div id="tripList"></div>
  </section>

  <section id="site" class="panel">
    <div class="card content">
      <h2>首頁與住宿</h2>
      <label>網站標題</label><input id="tripTitle">
      <label>旅遊日期顯示</label><input id="tripDates">
      <label>住宿名稱／顯示文字</label><textarea id="tripHotel"></textarea>
      <label>住宿導航地址</label><input id="tripHotelAddress">
      <label class="row"><input id="hotelNavEnabled" type="checkbox" style="width:auto">住宿顯示「開啟導航」</label>
      <label>導航地圖</label><select id="mapProvider"><option value="amap">高德地圖</option><option value="google">Google 地圖</option></select>
      <label>首頁大圖</label><label class="pick" for="heroFile">＋ 選擇首頁圖片</label><input id="heroFile" type="file" accept="image/*" style="display:none"><img id="heroPreview" class="preview">
      <label>住宿圖片</label><label class="pick" for="hotelFile">＋ 選擇住宿圖片</label><input id="hotelFile" type="file" accept="image/*" style="display:none"><img id="hotelPreview" class="preview">
      <button class="primary" id="saveSiteBtn">儲存首頁住宿</button>
    </div>
  </section>

  <section id="days" class="panel">
    <div class="card content">
      <h2>新增日期</h2>
      <label>用日曆選日期</label><input id="newDayDate" type="date">
      <label>這一天標題</label><input id="newDayTitle">
      <button class="primary" id="addDayBtn">＋ 新增這一天</button>
    </div>
    <div class="card content">
      <h2>每日行程</h2>
      <label>選擇日期</label><select id="daySelect"></select>
      <div id="emptyDaysNotice" class="warn" style="display:none">目前還沒有日期。</div>
      <div class="grid2">
        <div><label>日期</label><input id="dayDate" type="date"></div>
        <div><label>每日標題</label><input id="dayTitleInput"></div>
      </div>
      <div class="row">
        <button class="primary" id="saveDayMetaBtn">儲存日期標題</button>
        <button class="danger" id="deleteDayBtn">刪除這一天</button>
        <button class="soft" id="newItemBtn">＋ 新增行程</button>
      </div>
    </div>
    <div id="editor" class="card content" style="display:none">
      <h2>行程內容</h2>
      <input type="hidden" id="editIndex">
      <div class="grid2">
        <div><label>時間</label><input id="time" placeholder="09:00"></div>
        <div><label>分類</label><input id="tag" placeholder="景點／美食／交通"></div>
      </div>
      <label>名稱</label><input id="name">
      <label>地址／導航搜尋字</label><input id="address">
      <label class="row"><input id="navEnabled" type="checkbox" style="width:auto">這個地點顯示「開啟導航」</label>
      <label>圖片</label><label class="pick" for="imageFile">＋ 選擇行程圖片</label><input id="imageFile" type="file" accept="image/*" style="display:none"><img id="preview" class="preview"><input type="hidden" id="image">
      <label>更多行程圖片</label><label class="pick" for="imageMoreFile">＋ 新增更多圖片</label><input id="imageMoreFile" type="file" accept="image/*" multiple style="display:none"><div id="imageGalleryPreview" class="galleryPreview"></div><input type="hidden" id="imageUrls">
      <label>這個行程推薦美食</label><select id="itemFoodSelect"><option value="">不指定美食</option></select>
      <label>故事與特色</label><textarea id="story"></textarea>
      <label>推薦吃什麼</label><textarea id="food"></textarea>
      <div class="row"><button class="primary" id="saveItemBtn">儲存行程</button><button class="soft" id="cancelEditBtn">取消</button></div>
    </div>
    <div id="list"></div>
  </section>

  <section id="foods" class="panel">
    <div class="card content"><h2>美食管理</h2><button class="primary" id="newFoodBtn">＋ 新增美食</button></div>
    <div id="foodEditor" class="card content" style="display:none">
      <h2>美食內容</h2><input type="hidden" id="foodIndex">
      <label>美食名稱</label><input id="foodName">
      <div class="grid2"><div><label>口味</label><input id="foodTaste"></div><div><label>適合時間</label><input id="foodWhen"></div></div>
      <label>圖片</label><label class="pick" for="foodFile">＋ 選擇美食圖片</label><input id="foodFile" type="file" accept="image/*" style="display:none"><img id="foodPreview" class="preview"><input type="hidden" id="foodImage">
      <label>更多美食圖片</label><label class="pick" for="foodMoreFile">＋ 新增更多圖片</label><input id="foodMoreFile" type="file" accept="image/*" multiple style="display:none"><div id="foodGalleryPreview" class="galleryPreview"></div><input type="hidden" id="foodImageUrls">
      <label>美食特色</label><textarea id="foodStory"></textarea>
      <label>為什麼推薦</label><textarea id="foodWhy"></textarea>
      <div class="row"><button class="primary" id="saveFoodBtn">儲存美食</button><button class="soft" id="cancelFoodBtn">取消</button></div>
    </div>
    <div id="foodList"></div>
  </section>

  <section id="bulletin" class="panel">
    <div class="card content">
      <h2>新增公佈欄公告</h2>
      <label>公告標題</label><input id="annTitle" placeholder="例如：明天集合時間提醒">
      <label>公告內容</label><textarea id="annBody" placeholder="輸入要給使用者看的公告"></textarea>
      <label class="row"><input id="annPinned" type="checkbox" style="width:auto">置頂公告</label>
      <button class="primary" id="addAnnouncementBtn">＋ 發布到公佈欄</button>
    </div>
    <div class="card content">
      <h2>新增投票</h2>
      <label>投票問題</label><input id="pollQuestion" placeholder="例如：晚餐想吃什麼？">
      <label>選項，一行一個</label><textarea id="pollOptions" placeholder="沙茶麵&#10;海鮮&#10;薑母鴨"></textarea>
      <button class="primary" id="addPollBtn">＋ 建立投票</button>
    </div>
    <div class="card content"><h2>公佈欄公告列表</h2><button class="soft smallBtn" id="refreshBulletinBtn">重新整理公佈欄列表</button><div id="announcementList"></div></div>
    <div class="card content"><h2>公佈欄投票列表</h2><div id="pollAdminList"></div></div>
  </section>

  <section id="flights" class="panel">
    <div class="card content">
      <h2>去程航班</h2>
      <label>去程時間</label><input id="flightOutTime">
      <label>去程路線</label><input id="flightOutRoute">
      <label>去程圖片</label><label class="pick" for="flightOutFile">＋ 選擇去程圖片</label><input id="flightOutFile" type="file" accept="image/*" style="display:none"><img id="flightOutPreview" class="preview">
    </div>
    <div class="card content">
      <h2>回程航班</h2>
      <label>回程時間</label><input id="flightBackTime">
      <label>回程路線</label><input id="flightBackRoute">
      <label>回程圖片</label><label class="pick" for="flightBackFile">＋ 選擇回程圖片</label><input id="flightBackFile" type="file" accept="image/*" style="display:none"><img id="flightBackPreview" class="preview">
      <button class="primary" id="saveFlightsBtn">儲存航班資料</button>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://ovprxrcvclejwjytvfra.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cHJ4cmN2Y2xlandqeXR2ZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDUyODksImV4cCI6MjA5ODEyMTI4OX0.i72mbwna6qTR0nvDybeVqZmBgtpC_BAYaEwHaqjWKzg";
const PUBLIC_URL="https://beggar-site.vercel.app";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let TRIPS=[],CURRENT_TRIP=null,DATA={trip:{},days:[],foods:[],announcements:[],polls:[]};
function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function slugify(s){return String(s||"").trim().toLowerCase().replace(/\s+/g,"-").replace(/[^a-zA-Z0-9_-]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"")}
function toIso(v){return v?new Date(v).toISOString():null}
function toLocal(v){if(!v)return"";const d=new Date(v);if(Number.isNaN(d.getTime()))return"";const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`}
function publicLink(){return PUBLIC_URL}
async function run(label,fn){try{return await fn()}catch(e){console.error(label,e);alert(label+"失敗："+(e.message||JSON.stringify(e)));throw e}}
async function uploadFile(file,folder){const name=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");const path=`${folder}/${Date.now()}-${name}`;const r=await sb.storage.from("trip-images").upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||"image/jpeg"});if(r.error)throw r.error;return sb.storage.from("trip-images").getPublicUrl(path).data.publicUrl}
function bindFile(fileId,previewId,cb){$(fileId).addEventListener("change",async()=>run("圖片上傳",async()=>{const f=$(fileId).files[0];if(!f)return;const url=await uploadFile(f,fileId);$(previewId).src=url;$(previewId).style.display="block";cb(url);alert("圖片已上傳，記得按儲存。")}))}
function arrInput(id){try{return JSON.parse($(id).value||"[]")}catch(e){return[]}}
function setArrInput(id,arr){$(id).value=JSON.stringify(arr||[])}
function renderGallery(id,arr){$(id).innerHTML=(arr||[]).map(u=>`<img src="${u}">`).join("")}
function bindMultiFile(fileId,previewId,hiddenId){$(fileId).addEventListener("change",async()=>run("更多圖片上傳",async()=>{const files=Array.from($(fileId).files||[]);if(!files.length)return;const arr=arrInput(hiddenId);for(const f of files)arr.push(await uploadFile(f,fileId));setArrInput(hiddenId,arr);renderGallery(previewId,arr);alert("更多圖片已上傳，記得按儲存。")}))}

async function loadTrips(){const r=await sb.from("trips").select("*").order("created_at",{ascending:false});if(r.error)throw r.error;TRIPS=r.data||[];renderTrips();if(!CURRENT_TRIP&&TRIPS[0])await selectTrip(TRIPS[0].id)}
function renderTrips(){const box=$("tripList");box.innerHTML=TRIPS.map(t=>`<div class="card content item"><div class="listrow"><div><b>${esc(t.name)}</b> <span class="status">${esc(t.status)}</span> <span class="status">${t.public_enabled?"公開":"關閉"}</span><div class="muted">代號：${esc(t.slug)}｜密碼：<span class="codeText">${esc(t.access_code||"未設定")}</span></div><div class="muted">開放：${esc(t.open_at||"未設定")}｜關閉：${esc(t.close_at||"未設定")}</div><div class="muted">觀看網址：${PUBLIC_URL}</div></div><div class="row"><button class="soft" data-select="${t.id}">管理</button><button class="soft" data-copy="${t.id}">複製網址</button><button class="primary" data-open="${t.id}">開放</button><button class="orange" data-end="${t.id}">結束旅程</button><button class="danger" data-close="${t.id}">關閉公開</button><button class="danger" data-deltrip="${t.id}">刪除</button></div></div></div>`).join("")||'<div class="card content empty">尚未建立旅程。</div>';
document.querySelectorAll("[data-select]").forEach(b=>b.onclick=()=>selectTrip(b.dataset.select));
document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>navigator.clipboard?.writeText(PUBLIC_URL).then(()=>alert("已複製："+PUBLIC_URL)).catch(()=>prompt("複製網址",PUBLIC_URL)));
document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.open,"active",true));
document.querySelectorAll("[data-end]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.end,"ended",false));
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.close,"closed",false));
document.querySelectorAll("[data-deltrip]").forEach(b=>b.onclick=()=>deleteTrip(b.dataset.deltrip));
}
async function createTrip(){await run("建立旅程",async()=>{const name=$("newTripName").value.trim();if(!name)return alert("請輸入旅程名稱");let slug=slugify($("newTripSlug").value||name+"-"+Date.now());const code=($("newTripCode").value||slug).trim();const payload={name,slug,destination:$("newTripDestination").value||"",start_date:$("newTripStart").value||null,end_date:$("newTripEnd").value||null,status:"draft",public_enabled:false,access_code:code,open_at:toIso($("newTripOpenAt").value),close_at:toIso($("newTripCloseAt").value)};const r=await sb.from("trips").insert(payload).select().single();if(r.error)throw r.error;const dates=($("newTripStart").value||"")+"－"+($("newTripEnd").value||"");const s=await sb.from("trip_site_settings").insert({trip_id:r.data.id,title:name,dates,map_provider:"amap",hotel_nav_enabled:true});if(s.error)throw s.error;["newTripName","newTripSlug","newTripDestination","newTripCode","newTripStart","newTripEnd","newTripOpenAt","newTripCloseAt"].forEach(id=>$(id).value="");await loadTrips();await selectTrip(r.data.id);alert("新旅程已建立，密碼："+code)})}
async function deleteTrip(id){await run("刪除旅程",async()=>{const t=TRIPS.find(x=>x.id===id);if(!confirm(`確定刪除「${t?.name||"旅程"}」？資料無法復原。`))return;const r=await sb.from("trips").delete().eq("id",id);if(r.error)throw r.error;if(CURRENT_TRIP?.id===id){CURRENT_TRIP=null;DATA={trip:{},days:[],foods:[],announcements:[],polls:[]};$("currentTripTitle").textContent="尚未選擇旅程"}await loadTrips();alert("已刪除")})}
async function setTripStatus(id,status,public_enabled){await run("更新狀態",async()=>{const r=await sb.from("trips").update({status,public_enabled}).eq("id",id).select().single();if(r.error)throw r.error;await loadTrips();if(CURRENT_TRIP?.id===id)await selectTrip(id)})}
async function selectTrip(id){CURRENT_TRIP=TRIPS.find(t=>t.id===id)||null;$("currentTripTitle").textContent=CURRENT_TRIP?`目前管理：${CURRENT_TRIP.name}（${CURRENT_TRIP.status}／${CURRENT_TRIP.public_enabled?"公開":"關閉"}）`:"尚未選擇旅程";fillQuick();if(CURRENT_TRIP)await loadTripData()}
function fillQuick(){if(!CURRENT_TRIP)return; $("quickAccessCode").value=CURRENT_TRIP.access_code||CURRENT_TRIP.slug||"";$("quickPublicEnabled").value=CURRENT_TRIP.public_enabled?"true":"false";$("quickOpenAt").value=toLocal(CURRENT_TRIP.open_at);$("quickCloseAt").value=toLocal(CURRENT_TRIP.close_at)}
async function saveQuick(){await run("儲存密碼與時間",async()=>{if(!CURRENT_TRIP)return alert("請先選擇旅程");const payload={access_code:$("quickAccessCode").value.trim()||CURRENT_TRIP.slug,public_enabled:$("quickPublicEnabled").value==="true",open_at:toIso($("quickOpenAt").value),close_at:toIso($("quickCloseAt").value)};if(payload.public_enabled&&CURRENT_TRIP.status==="draft")payload.status="active";const r=await sb.from("trips").update(payload).eq("id",CURRENT_TRIP.id).select().single();if(r.error)throw r.error;await loadTrips();await selectTrip(r.data.id);alert("已儲存")})}
async function clearTime(){await run("清除時間限制",async()=>{if(!CURRENT_TRIP)return;if(!confirm("確定清除時間限制？"))return;const r=await sb.from("trips").update({open_at:null,close_at:null}).eq("id",CURRENT_TRIP.id).select().single();if(r.error)throw r.error;await loadTrips();await selectTrip(r.data.id)})}

async function loadTripData(){const id=CURRENT_TRIP.id;const [site,days,items,foods,anns,polls]=await Promise.all([
sb.from("trip_site_settings").select("*").eq("trip_id",id).maybeSingle(),
sb.from("trip_days").select("*").eq("trip_id",id).order("date").order("day_order"),
sb.from("trip_itinerary_items").select("*").eq("trip_id",id).order("item_order"),
sb.from("trip_foods").select("*").eq("trip_id",id).order("food_order"),
sb.from("trip_announcements").select("*").eq("trip_id",id).order("is_pinned",{ascending:false}).order("created_at",{ascending:false}),
sb.from("trip_polls").select("*, trip_poll_options(*), trip_poll_votes(*)").eq("trip_id",id).order("created_at",{ascending:false})
]);[site,days,items,foods,anns,polls].forEach(r=>{if(r.error)throw r.error});const ds=(days.data||[]).map(d=>({...d,items:[]}));const by=Object.fromEntries(ds.map(d=>[d.id,d]));(items.data||[]).forEach(x=>{if(by[x.day_id])by[x.day_id].items.push(x)});DATA={trip:{...(site.data||{})},days:ds.map(d=>({id:d.id,date:d.date,title:d.title,items:d.items.map(x=>({id:x.id,time:x.time,name:x.name,address:x.address,tag:x.tag,image:x.image,imageUrls:x.image_urls||[],story:x.story,food:x.food,foodId:x.food_id,navEnabled:x.nav_enabled,completed:x.completed}))})),foods:(foods.data||[]).map(f=>({id:f.id,name:f.name,image:f.image,imageUrls:f.image_urls||[],story:f.story,why:f.why,taste:f.taste,when:f.when_text})),announcements:anns.data||[],polls:polls.data||[]};fillAll()}
function fillAll(){fillSite();fillFlights();populateDaySelect();loadDayMeta();renderItems();renderFoods();renderAnnouncements();renderPolls();fillItemFoodSelect()}
function fillSite(){const t=DATA.trip;$("tripTitle").value=t.title||CURRENT_TRIP.name||"";$("tripDates").value=t.dates||"";$("tripHotel").value=t.hotel||"";$("tripHotelAddress").value=t.hotel_address||"";$("hotelNavEnabled").checked=t.hotel_nav_enabled!==false;$("mapProvider").value=t.map_provider||"amap";showPreview("heroPreview",t.hero_image);showPreview("hotelPreview",t.hotel_image)}
function showPreview(id,url){if(url){$(id).src=url;$(id).style.display="block"}else{$(id).removeAttribute("src");$(id).style.display="none"}}
async function saveSite(){await run("儲存首頁住宿",async()=>{if(!CURRENT_TRIP)return alert("請先選擇旅程");const title=$("tripTitle").value||CURRENT_TRIP.name;const r=await sb.from("trip_site_settings").upsert({trip_id:CURRENT_TRIP.id,title,dates:$("tripDates").value,hotel:$("tripHotel").value,hotel_address:$("tripHotelAddress").value,hotel_nav_enabled:$("hotelNavEnabled").checked,map_provider:$("mapProvider").value,hero_image:DATA.trip.hero_image||"",hotel_image:DATA.trip.hotel_image||""},{onConflict:"trip_id"});if(r.error)throw r.error;const tr=await sb.from("trips").update({name:title}).eq("id",CURRENT_TRIP.id).select().single();if(tr.error)throw tr.error;await loadTrips();await selectTrip(tr.data.id);alert("已儲存")})}
async function publishTrip(){await saveSite();await saveFlights(false);await setTripStatus(CURRENT_TRIP.id,"active",true);alert("已儲存並開放觀看版")}
async function endTrip(){if(!CURRENT_TRIP)return;if(!confirm("結束旅程並關閉公開？"))return;await setTripStatus(CURRENT_TRIP.id,"ended",false)}
async function closePublic(){if(!CURRENT_TRIP)return;await setTripStatus(CURRENT_TRIP.id,"closed",false)}

function fillFlights(){const t=DATA.trip;$("flightOutTime").value=t.flight_out_time||"";$("flightOutRoute").value=t.flight_out_route||"";$("flightBackTime").value=t.flight_back_time||"";$("flightBackRoute").value=t.flight_back_route||"";showPreview("flightOutPreview",t.flight_out_image);showPreview("flightBackPreview",t.flight_back_image)}
async function saveFlights(show=true){await run("儲存航班",async()=>{if(!CURRENT_TRIP)return;const r=await sb.from("trip_site_settings").upsert({trip_id:CURRENT_TRIP.id,flight_out_time:$("flightOutTime").value,flight_out_route:$("flightOutRoute").value,flight_out_image:DATA.trip.flight_out_image||"",flight_back_time:$("flightBackTime").value,flight_back_route:$("flightBackRoute").value,flight_back_image:DATA.trip.flight_back_image||""},{onConflict:"trip_id"});if(r.error)throw r.error;await loadTripData();if(show)alert("航班已儲存")})}

function currentDay(){return DATA.days[Number($("daySelect").value)]}
function populateDaySelect(){$("daySelect").innerHTML=DATA.days.map((d,i)=>`<option value="${i}">${d.date}｜${esc(d.title||"未命名")}</option>`).join("");$("emptyDaysNotice").style.display=DATA.days.length?"none":"block"}
function loadDayMeta(){const d=currentDay();$("dayDate").value=d?.date||"";$("dayTitleInput").value=d?.title||""}
async function addDay(){await run("新增日期",async()=>{if(!CURRENT_TRIP)return;const date=$("newDayDate").value;if(!date)return alert("請選日期");const r=await sb.from("trip_days").insert({trip_id:CURRENT_TRIP.id,day_order:DATA.days.length,date,title:$("newDayTitle").value||"未命名行程"});if(r.error)throw r.error;$("newDayDate").value="";$("newDayTitle").value="";await loadTripData()})}
async function saveDayMeta(){await run("儲存日期",async()=>{const d=currentDay();if(!d)return;const r=await sb.from("trip_days").update({date:$("dayDate").value,title:$("dayTitleInput").value}).eq("id",d.id);if(r.error)throw r.error;await loadTripData();alert("日期已儲存")})}
async function deleteDay(){await run("刪除日期",async()=>{const d=currentDay();if(!d)return;if(!confirm("刪除這一天？"))return;const r=await sb.from("trip_days").delete().eq("id",d.id);if(r.error)throw r.error;await loadTripData()})}
function renderItems(){const d=currentDay();if(!d){$("list").innerHTML="";return}$("list").innerHTML=d.items.map((x,i)=>`<div class="card content item"><div class="listrow"><div>${x.image?`<img class="thumb" src="${x.image}">`:""}<b>${esc(x.time||"")}　${esc(x.name||"")}</b><div class="muted">${esc(x.tag||"")}｜${x.navEnabled===false?"導航關閉":"導航開啟"}｜${esc(x.address||"未填地址")}</div></div><div class="row"><button class="soft" data-edit="${i}">編輯</button><button class="danger" data-del="${i}">刪除</button><button class="primary" data-complete="${i}">${x.completed?"取消完成":"完成"}</button></div></div></div>`).join("");document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>editItem(Number(b.dataset.edit)));document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteItem(Number(b.dataset.del)));document.querySelectorAll("[data-complete]").forEach(b=>b.onclick=()=>completeItem(Number(b.dataset.complete)))}
function editItem(i){const x=currentDay().items[i];$("editIndex").value=i;["time","name","address","tag","story","food"].forEach(k=>$(k).value=x[k]||"");$("navEnabled").checked=x.navEnabled!==false;$("image").value=x.image||"";setArrInput("imageUrls",x.imageUrls||[]);renderGallery("imageGalleryPreview",x.imageUrls||[]);fillItemFoodSelect(x.foodId||"");showPreview("preview",x.image);$("editor").style.display="block"}
function newItem(){if(!currentDay())return alert("請先新增日期");$("editIndex").value="";["time","name","address","tag","story","food"].forEach(k=>$(k).value="");$("navEnabled").checked=true;$("image").value="";setArrInput("imageUrls",[]);renderGallery("imageGalleryPreview",[]);fillItemFoodSelect("");showPreview("preview","");$("editor").style.display="block"}
async function saveItem(){await run("儲存行程",async()=>{const d=currentDay();if(!d)return alert("請先新增日期");const name=$("name").value.trim();if(!name)return alert("請輸入行程名稱");const payload={trip_id:CURRENT_TRIP.id,day_id:d.id,item_order:d.items.length,time:$("time").value,name,address:$("address").value,tag:$("tag").value,image:$("image").value,image_urls:arrInput("imageUrls"),story:$("story").value,food:$("food").value,food_id:$("itemFoodSelect").value||null,nav_enabled:$("navEnabled").checked};let r;if($("editIndex").value==="")r=await sb.from("trip_itinerary_items").insert(payload);else{const old=d.items[Number($("editIndex").value)];r=await sb.from("trip_itinerary_items").update(payload).eq("id",old.id)}if(r.error)throw r.error;$("editor").style.display="none";await loadTripData();alert("行程已儲存")})}
async function deleteItem(i){await run("刪除行程",async()=>{if(!confirm("刪除行程？"))return;const old=currentDay().items[i];const r=await sb.from("trip_itinerary_items").delete().eq("id",old.id);if(r.error)throw r.error;await loadTripData()})}
async function completeItem(i){await run("更新完成",async()=>{const old=currentDay().items[i];const r=await sb.from("trip_itinerary_items").update({completed:!old.completed}).eq("id",old.id);if(r.error)throw r.error;await loadTripData()})}

function renderFoods(){$("foodList").innerHTML=DATA.foods.map((f,i)=>`<div class="card content item"><div class="listrow"><div>${f.image?`<img class="thumb" src="${f.image}">`:""}<b>${esc(f.name)}</b><div class="muted">${esc(f.taste||"")}｜${esc(f.when||"")}</div></div><div class="row"><button class="soft" data-food-edit="${i}">編輯</button><button class="danger" data-food-del="${i}">刪除</button></div></div></div>`).join("")||'<div class="card content muted">尚未新增美食。</div>';document.querySelectorAll("[data-food-edit]").forEach(b=>b.onclick=()=>editFood(Number(b.dataset.foodEdit)));document.querySelectorAll("[data-food-del]").forEach(b=>b.onclick=()=>deleteFood(Number(b.dataset.foodDel)))}
function editFood(i){const f=DATA.foods[i];$("foodIndex").value=i;$("foodName").value=f.name||"";$("foodTaste").value=f.taste||"";$("foodWhen").value=f.when||"";$("foodStory").value=f.story||"";$("foodWhy").value=f.why||"";$("foodImage").value=f.image||"";setArrInput("foodImageUrls",f.imageUrls||[]);renderGallery("foodGalleryPreview",f.imageUrls||[]);showPreview("foodPreview",f.image);$("foodEditor").style.display="block"}
function newFood(){$("foodIndex").value="";["foodName","foodTaste","foodWhen","foodStory","foodWhy"].forEach(id=>$(id).value="");$("foodImage").value="";setArrInput("foodImageUrls",[]);renderGallery("foodGalleryPreview",[]);showPreview("foodPreview","");$("foodEditor").style.display="block"}
async function saveFood(){await run("儲存美食",async()=>{if(!CURRENT_TRIP)return;const name=$("foodName").value.trim();if(!name)return alert("請輸入美食名稱");const payload={trip_id:CURRENT_TRIP.id,food_order:DATA.foods.length,name,image:$("foodImage").value,image_urls:arrInput("foodImageUrls"),story:$("foodStory").value,why:$("foodWhy").value,taste:$("foodTaste").value,when_text:$("foodWhen").value};let r;if($("foodIndex").value==="")r=await sb.from("trip_foods").insert(payload);else{const old=DATA.foods[Number($("foodIndex").value)];r=await sb.from("trip_foods").update(payload).eq("id",old.id)}if(r.error)throw r.error;$("foodEditor").style.display="none";await loadTripData();alert("美食已儲存")})}
async function deleteFood(i){await run("刪除美食",async()=>{if(!confirm("刪除美食？"))return;const old=DATA.foods[i];const r=await sb.from("trip_foods").delete().eq("id",old.id);if(r.error)throw r.error;await loadTripData()})}
function fillItemFoodSelect(sel=""){const box=$("itemFoodSelect");box.innerHTML='<option value="">不指定美食</option>'+DATA.foods.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join("");box.value=sel||""}

async function addAnnouncement(){await run("發布公告",async()=>{if(!CURRENT_TRIP)return;const title=$("annTitle").value.trim()||"公告";const body=$("annBody").value.trim();if(!body&&!title)return alert("請輸入公告");const r=await sb.from("trip_announcements").insert({trip_id:CURRENT_TRIP.id,title,body,is_active:true,is_pinned:$("annPinned").checked});if(r.error)throw r.error;$("annTitle").value="";$("annBody").value="";$("annPinned").checked=false;await loadTripData();alert("公告已發布")})}
function renderAnnouncements(){const list=DATA.announcements||[];$("announcementList").innerHTML=list.length?list.map(a=>`<div class="item"><b>${esc(a.title||"公告")}</b> ${a.is_active?'<span class="status">顯示</span>':'<span class="status">隱藏</span>'} ${a.is_pinned?'<span class="status">置頂</span>':''}<div class="muted announcementBody">${esc(a.body||"")}</div><div class="row"><button class="soft smallBtn" data-ann-toggle="${a.id}">${a.is_active?"隱藏":"顯示"}</button><button class="danger smallBtn" data-ann-del="${a.id}">刪除</button></div></div>`).join(""):'<div class="muted">尚未新增公告。</div>';document.querySelectorAll("[data-ann-toggle]").forEach(b=>b.onclick=()=>toggleAnnouncement(Number(b.dataset.annToggle)));document.querySelectorAll("[data-ann-del]").forEach(b=>b.onclick=()=>deleteAnnouncement(Number(b.dataset.annDel)))}
async function toggleAnnouncement(id){await run("更新公告",async()=>{const a=DATA.announcements.find(x=>x.id===id);const r=await sb.from("trip_announcements").update({is_active:!a.is_active}).eq("id",id);if(r.error)throw r.error;await loadTripData()})}
async function deleteAnnouncement(id){await run("刪除公告",async()=>{if(!confirm("刪除公告？"))return;const r=await sb.from("trip_announcements").delete().eq("id",id);if(r.error)throw r.error;await loadTripData()})}
async function addPoll(){await run("建立投票",async()=>{if(!CURRENT_TRIP)return;const q=$("pollQuestion").value.trim();const opts=($("pollOptions").value||"").split(/\r?\n|,|，|、/).map(x=>x.trim()).filter(Boolean);if(!q)return alert("請輸入投票問題");if(opts.length<2)return alert("至少兩個選項");const p=await sb.from("trip_polls").insert({trip_id:CURRENT_TRIP.id,question:q,is_active:true}).select().single();if(p.error)throw p.error;const rows=opts.map((option_text,i)=>({poll_id:p.data.id,option_text,option_order:i}));const o=await sb.from("trip_poll_options").insert(rows);if(o.error)throw o.error;$("pollQuestion").value="";$("pollOptions").value="";await loadTripData();alert("投票已建立")})}
function renderPolls(){const list=DATA.polls||[];$("pollAdminList").innerHTML=list.length?list.map(p=>{const votes=p.trip_poll_votes||[];const options=(p.trip_poll_options||[]).sort((a,b)=>(a.option_order||0)-(b.option_order||0));return `<div class="item"><b>${esc(p.question)}</b> ${p.is_active?'<span class="status">顯示</span>':'<span class="status">隱藏</span>'}${options.map(o=>`<div class="muted">・${esc(o.option_text)}：${votes.filter(v=>v.option_id===o.id).length} 票</div>`).join("")}<div class="row"><button class="soft smallBtn" data-poll-toggle="${p.id}">${p.is_active?"隱藏":"顯示"}</button><button class="danger smallBtn" data-poll-del="${p.id}">刪除</button></div></div>`}).join(""):'<div class="muted">尚未新增投票。</div>';document.querySelectorAll("[data-poll-toggle]").forEach(b=>b.onclick=()=>togglePoll(Number(b.dataset.pollToggle)));document.querySelectorAll("[data-poll-del]").forEach(b=>b.onclick=()=>deletePoll(Number(b.dataset.pollDel)))}
async function togglePoll(id){await run("更新投票",async()=>{const p=DATA.polls.find(x=>x.id===id);const r=await sb.from("trip_polls").update({is_active:!p.is_active}).eq("id",id);if(r.error)throw r.error;await loadTripData()})}
async function deletePoll(id){await run("刪除投票",async()=>{if(!confirm("刪除投票？"))return;const r=await sb.from("trip_polls").delete().eq("id",id);if(r.error)throw r.error;await loadTripData()})}

async function addDemoData(){await run("加入測試資料",async()=>{if(!CURRENT_TRIP)return alert("請先選擇旅程");if(!confirm("加入公告、投票、日期、行程、美食測試資料？"))return;const today=new Date().toISOString().slice(0,10);await sb.from("trip_announcements").insert({trip_id:CURRENT_TRIP.id,title:"測試公告：集合時間提醒",body:"這是一則測試公告。",is_active:true,is_pinned:true});const p=await sb.from("trip_polls").insert({trip_id:CURRENT_TRIP.id,question:"測試投票：今晚想吃什麼？",is_active:true}).select().single();if(p.error)throw p.error;await sb.from("trip_poll_options").insert(["沙茶麵","海鮮料理","薑母鴨"].map((option_text,i)=>({poll_id:p.data.id,option_text,option_order:i})));const d=await sb.from("trip_days").insert({trip_id:CURRENT_TRIP.id,day_order:DATA.days.length,date:today,title:"測試日期"}).select().single();if(d.error)throw d.error;const f=await sb.from("trip_foods").insert({trip_id:CURRENT_TRIP.id,food_order:DATA.foods.length,name:"測試美食：沙茶麵",story:"測試美食介紹",taste:"濃郁、微辣",when_text:"午餐或晚餐"}).select().single();if(f.error)throw f.error;await sb.from("trip_itinerary_items").insert({trip_id:CURRENT_TRIP.id,day_id:d.data.id,item_order:0,time:"12:00",name:"測試行程：午餐集合",address:"廈門中山路步行街",tag:"美食",story:"測試行程介紹",food:"推薦吃沙茶麵",food_id:f.data.id,nav_enabled:true});await loadTripData();alert("測試資料已加入")})}

function bindTabs(){document.querySelectorAll(".adminTab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".adminTab").forEach(x=>x.classList.remove("active"));t.classList.add("active");document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));$(t.dataset.panel).classList.add("active");scrollTo(0,0)})}
function bindImages(){bindFile("heroFile","heroPreview",u=>DATA.trip.hero_image=u);bindFile("hotelFile","hotelPreview",u=>DATA.trip.hotel_image=u);bindFile("flightOutFile","flightOutPreview",u=>DATA.trip.flight_out_image=u);bindFile("flightBackFile","flightBackPreview",u=>DATA.trip.flight_back_image=u);bindFile("imageFile","preview",u=>$("image").value=u);bindFile("foodFile","foodPreview",u=>$("foodImage").value=u);bindMultiFile("imageMoreFile","imageGalleryPreview","imageUrls");bindMultiFile("foodMoreFile","foodGalleryPreview","foodImageUrls")}
function bindButtons(){$("createTripBtn").onclick=createTrip;$("reloadTripsBtn").onclick=loadTrips;$("saveTripQuickSettingsBtn").onclick=saveQuick;$("clearTripTimeBtn").onclick=clearTime;$("publishTripBtn").onclick=publishTrip;$("endTripBtn").onclick=endTrip;$("closePublicBtn").onclick=closePublic;$("demoDataBtn").onclick=addDemoData;$("saveSiteBtn").onclick=saveSite;$("saveFlightsBtn").onclick=()=>saveFlights(true);$("daySelect").onchange=()=>{loadDayMeta();renderItems()};$("addDayBtn").onclick=addDay;$("saveDayMetaBtn").onclick=saveDayMeta;$("deleteDayBtn").onclick=deleteDay;$("newItemBtn").onclick=newItem;$("saveItemBtn").onclick=saveItem;$("cancelEditBtn").onclick=()=>{$("editor").style.display="none"};$("newFoodBtn").onclick=newFood;$("saveFoodBtn").onclick=saveFood;$("cancelFoodBtn").onclick=()=>{$("foodEditor").style.display="none"};$("addAnnouncementBtn").onclick=addAnnouncement;$("addPollBtn").onclick=addPoll;$("refreshBulletinBtn").onclick=loadTripData}
async function init(){bindTabs();bindButtons();bindImages();await run("讀取旅程",loadTrips)}
init();
</script>
</body>
</html>
