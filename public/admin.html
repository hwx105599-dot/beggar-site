<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>旅行雲端管理版</title><style>
:root{--p:#0f766e;--bg:#f4f7f7;--text:#1f2937;--muted:#667085;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text)}
.app,.wrap{max-width:860px;margin:auto;padding-bottom:88px}.wrap{padding:18px}.hero{height:280px;background-size:cover;background-position:center;background-color:#0f766e;position:relative}
.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.heroText{position:absolute;z-index:1;left:20px;right:20px;bottom:22px;color:white}.heroText h1{margin:0 0 6px;font-size:29px}
main{padding:14px}.card{background:white;border-radius:18px;box-shadow:0 4px 18px rgba(15,23,42,.06);overflow:hidden;margin-bottom:14px}
.card img{width:100%;height:220px;object-fit:cover;background:#edf2f7}.content{padding:15px}.time{font-weight:800;color:var(--p);font-size:14px}.title{font-size:20px;margin:3px 0 8px}
.badge{display:inline-block;background:#e7f8f5;color:var(--p);padding:5px 8px;border-radius:999px;font-size:11px;font-weight:700}
.brief,.muted{color:var(--muted);font-size:14px;line-height:1.55}.actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
button,.btn{border:0;border-radius:11px;padding:10px 12px;font-weight:700;cursor:pointer}.primary{background:var(--p);color:white}.soft{background:#eef7f6;color:var(--p)}.danger{background:#fee4e2;color:#b42318}.gray{background:#f2f4f7;color:#344054}.orange{background:#fff7ed;color:#9a3412}
.daybar{display:flex;gap:8px;overflow:auto;padding:4px 0 12px}.day{border:0;background:white;border-radius:13px;padding:10px 13px;white-space:nowrap;font-weight:700;color:var(--muted);box-shadow:0 2px 10px rgba(15,23,42,.04)}.day.active{background:var(--p);color:white}
.sectionTitle{font-size:21px;margin:14px 3px 10px}.foodGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.food img{height:140px}.food .title{font-size:17px}
.topCards{display:grid;gap:12px}.flightCard img{height:auto}.hotel{font-size:14px;color:var(--muted);line-height:1.6}
nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:9}
.navin{max-width:860px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr)}.tab{border:0;background:none;padding:8px;color:var(--muted);font-weight:700}.tab.active{color:var(--p)}
.screen{display:none}.screen.active{display:block}.empty{padding:18px;color:var(--muted)}
.modalMask{position:fixed;inset:0;background:rgba(15,23,42,.58);z-index:99;display:none;align-items:flex-end;justify-content:center}
.modalMask.active{display:flex}.modal{background:white;width:min(860px,100%);max-height:88vh;overflow:auto;border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.22)}
.modal img{width:100%;height:260px;object-fit:cover;background:#edf2f7}.modalContent{padding:16px 16px 28px}.modalHeader{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.close{background:#f2f4f7;color:#344054;border:0;border-radius:999px;padding:8px 11px;font-weight:900}
.info{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}.info b{display:block;margin-bottom:4px}.info p{margin:0;color:var(--muted);line-height:1.6;font-size:14px}
input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #d0d5dd;border-radius:10px;padding:10px;margin:5px 0 10px;font:inherit}textarea{min-height:82px}
label{font-size:13px;font-weight:800;color:#344054}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:8px}.done{color:#067647;font-weight:800}
.preview{width:100%;max-height:260px;object-fit:cover;border-radius:12px;background:#edf2f7;margin:8px 0;display:none}.pick{display:inline-flex;align-items:center;justify-content:center;border:2px dashed #99d6cc;color:#0f766e;background:#f0fdfa;border-radius:14px;height:76px;font-weight:900;font-size:16px;cursor:pointer;width:100%;text-align:center}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}.adminTab{background:white;color:#667085}.adminTab.active{background:#0f766e;color:white}
.panel{display:none}.panel.active{display:block}.thumb{width:90px;height:62px;object-fit:cover;border-radius:8px;background:#edf2f7}.listrow{display:flex;gap:12px;align-items:center;justify-content:space-between}.listleft{display:flex;gap:12px;align-items:center}.switch{width:auto;margin-right:6px}.warn{background:#fff7ed;color:#9a3412;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}
.success{background:#ecfdf3;color:#067647;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}.status{font-size:12px;padding:4px 8px;border-radius:999px;background:#f2f4f7;color:#344054}.tripLink{word-break:break-all;max-height:42px;overflow:hidden}.tripCard{min-height:auto!important}.tripCard .listrow{align-items:flex-start}.copyOk{background:#ecfdf3;color:#067647}
@media(max-width:700px){.tabs{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.listrow{align-items:flex-start;display:block}.listleft{align-items:flex-start}.thumb{width:72px;height:56px}.foodGrid{grid-template-columns:1fr}}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:8px 0}.gallery img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}.miniFood{display:flex;gap:10px;align-items:center;background:#f8fafc;border-radius:12px;padding:10px;margin-top:10px}.miniFood img{width:80px;height:60px;object-fit:cover;border-radius:8px}.galleryPreview{display:flex;gap:8px;overflow-x:auto;margin:8px 0}.galleryPreview img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}.loginBox{max-width:520px;margin:24px auto}.loginBox input{font-size:18px}.blocked{padding:28px;text-align:center}.codeText{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f2f4f7;padding:4px 8px;border-radius:8px}.timeSmall{font-size:12px;color:#667085}.noticeCard{border-left:5px solid #0f766e}.pollOption{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid #e5e7eb;border-radius:12px;padding:10px;margin:8px 0;background:#fff}.pollBar{height:8px;background:#e7f8f5;border-radius:999px;overflow:hidden;margin-top:6px}.pollBar span{display:block;height:100%;background:#0f766e}.smallBtn{padding:7px 10px;font-size:12px}.adminListTitle{font-weight:800;margin-bottom:4px}.announcementBody{white-space:pre-wrap}.textareaSmall{min-height:56px}.quickSettings{border:1px solid #d1fae5}.quickSettings h2{margin-bottom:8px}</style></head><body><div class="wrap">
<h1>旅行雲端管理版｜多旅程 v28</h1><div id="currentTripTitle" class="success">尚未選擇旅程</div>
<div class="card quickSettings">
  <h2>旅程密碼與開放時間</h2>
  <div class="grid2">
    <div>
      <label>旅程密碼</label>
      <input id="quickAccessCode" placeholder="例如：xiamen2026">
    </div>
    <div>
      <label>是否公開觀看</label>
      <select id="quickPublicEnabled">
        <option value="true">公開</option>
        <option value="false">關閉</option>
      </select>
    </div>
    <div>
      <label>開放開始日期時間</label>
      <input id="quickOpenAt" type="datetime-local">
    </div>
    <div>
      <label>開放結束日期時間</label>
      <input id="quickCloseAt" type="datetime-local">
    </div>
  </div>
  <div class="row">
    <button class="primary" id="saveTripQuickSettingsBtn">儲存密碼與時間</button>
    <button class="soft" id="clearTripTimeBtn">清除時間限制</button>
  </div>
  <div class="muted">只改這裡不會影響每日行程。時間或密碼打錯，可以在這裡修正。</div>
</div>
<div class="card"><div class="row"><button class="primary" id="publishTripBtn">儲存並開放觀看版</button><button class="orange" id="endTripBtn">結束旅程</button><button class="danger" id="closePublicBtn">關閉公開</button><button class="soft" id="demoDataBtn">加入測試資料</button></div><div class="muted">按「儲存首頁住宿」會更新我的旅程列表；按「儲存並開放觀看版」後，使用者重新整理觀看版就會看到最新內容。</div></div>
<div class="tabs"><button class="adminTab active" data-panel="trips">我的旅程</button><button class="adminTab" data-panel="site">首頁住宿</button><button class="adminTab" data-panel="days">每日行程</button><button class="adminTab" data-panel="foods">美食管理</button><button class="adminTab" data-panel="flights">航班資料</button><button class="adminTab" data-panel="announcements">公佈欄</button></div>
<section id="trips" class="panel active"><div class="card"><h2>建立新旅程</h2><div class="grid2"><div><label>旅程名稱</label><input id="newTripName" placeholder="例如：廈門旅行"></div><div><label>旅程代號</label><input id="newTripSlug" placeholder="例如：xiamen-20260711"></div></div><div class="grid2"><div><label>目的地</label><input id="newTripDestination"></div><div><label>旅程密碼</label><input id="newTripCode" placeholder="例如：xiamen2026"></div><div><label>開始日期</label><input id="newTripStart" type="date"></div><div><label>結束日期</label><input id="newTripEnd" type="date"></div><div><label>開放開始時間</label><input id="newTripOpenAt" type="datetime-local"></div><div><label>開放結束時間</label><input id="newTripCloseAt" type="datetime-local"></div></div><button class="primary" id="createTripBtn">＋ 建立新旅程</button><div class="muted">如果沒有填旅程密碼，系統會自動用旅程代號當密碼。</div><button class="soft" id="reloadTripsBtn">重新讀取旅程</button></div><div id="tripList"></div></section>
<section id="site" class="panel"><div class="card"><h2>首頁與住宿</h2><label>網站標題</label><input id="tripTitle"><label>旅遊日期顯示</label><input id="tripDates"><label>住宿名稱／顯示文字</label><textarea id="tripHotel"></textarea><label>住宿導航地址</label><input id="tripHotelAddress"><label class="row"><input class="switch" id="hotelNavEnabled" type="checkbox">住宿顯示「開啟導航」</label><label>導航地圖</label><select id="mapProvider"><option value="amap">高德地圖</option><option value="google">Google 地圖</option></select><label>首頁大圖</label><label class="pick" for="heroFile">＋ 選擇首頁圖片</label><input id="heroFile" type="file" accept="image/*" style="display:none"><img id="heroPreview" class="preview"><label>住宿圖片</label><label class="pick" for="hotelFile">＋ 選擇住宿圖片</label><input id="hotelFile" type="file" accept="image/*" style="display:none"><img id="hotelPreview" class="preview"><button class="primary" id="saveSiteBtn">儲存首頁住宿</button></div></section>
<section id="flights" class="panel"><div class="card"><h2>去程航班</h2><label>去程時間</label><input id="flightOutTime"><label>去程路線</label><input id="flightOutRoute"><label>去程圖片</label><label class="pick" for="flightOutFile">＋ 選擇去程圖片</label><input id="flightOutFile" type="file" accept="image/*" style="display:none"><img id="flightOutPreview" class="preview"></div><div class="card"><h2>回程航班</h2><label>回程時間</label><input id="flightBackTime"><label>回程路線</label><input id="flightBackRoute"><label>回程圖片</label><label class="pick" for="flightBackFile">＋ 選擇回程圖片</label><input id="flightBackFile" type="file" accept="image/*" style="display:none"><img id="flightBackPreview" class="preview"><button class="primary" id="saveFlightsBtn">儲存航班資料</button></div></section>
<section id="days" class="panel"><div class="card"><h2>新增日期</h2><label>用日曆選日期</label><input id="newDayDate" type="date"><label>這一天標題</label><input id="newDayTitle"><button class="primary" id="addDayBtn">＋ 新增這一天</button></div><div class="card"><h2>每日行程</h2><label>選擇日期</label><select id="daySelect"></select><div id="emptyDaysNotice" class="warn" style="display:none">目前還沒有日期。</div><div class="grid2"><div><label>日期</label><input id="dayDate" type="date"></div><div><label>每日標題</label><input id="dayTitleInput"></div></div><div class="row"><button class="primary" id="saveDayMetaBtn">儲存日期標題</button><button class="danger" id="deleteDayBtn">刪除這一天</button><button class="soft" id="newItemBtn">＋ 新增行程</button></div></div><div id="editor" class="card" style="display:none"><h2>行程內容</h2><input type="hidden" id="editIndex"><div class="grid2"><div><label>時間</label><input id="time"></div><div><label>分類</label><input id="tag"></div></div><label>名稱</label><input id="name"><label>地址／導航搜尋字</label><input id="address"><label class="row"><input class="switch" id="navEnabled" type="checkbox">這個地點顯示「開啟導航」</label><label>圖片</label><label class="pick" for="imageFile">＋ 選擇行程圖片</label><input id="imageFile" type="file" accept="image/*" style="display:none"><img id="preview" class="preview"><input type="hidden" id="image"><label>更多行程圖片</label><label class="pick" for="imageMoreFile">＋ 新增更多圖片</label><input id="imageMoreFile" type="file" accept="image/*" multiple style="display:none"><div id="imageGalleryPreview" class="galleryPreview"></div><input type="hidden" id="imageUrls"><label>這個行程推薦美食</label><select id="itemFoodSelect"><option value="">不指定美食</option></select><label>故事與特色</label><textarea id="story"></textarea><label>推薦吃什麼</label><textarea id="food"></textarea><div class="row"><button class="primary" id="saveItemBtn">儲存行程</button><button class="soft" id="cancelEditBtn">取消</button></div></div><div id="list"></div></section>
<section id="foods" class="panel"><div class="card"><h2>美食管理</h2><button class="primary" id="newFoodBtn">＋ 新增美食</button></div><div id="foodEditor" class="card" style="display:none"><h2>美食內容</h2><input type="hidden" id="foodIndex"><label>美食名稱</label><input id="foodName"><div class="grid2"><div><label>口味</label><input id="foodTaste"></div><div><label>適合時間</label><input id="foodWhen"></div></div><label>圖片</label><label class="pick" for="foodFile">＋ 選擇美食圖片</label><input id="foodFile" type="file" accept="image/*" style="display:none"><img id="foodPreview" class="preview"><input type="hidden" id="foodImage"><label>更多美食圖片</label><label class="pick" for="foodMoreFile">＋ 新增更多圖片</label><input id="foodMoreFile" type="file" accept="image/*" multiple style="display:none"><div id="foodGalleryPreview" class="galleryPreview"></div><input type="hidden" id="foodImageUrls"><label>美食特色</label><textarea id="foodStory"></textarea><label>為什麼推薦</label><textarea id="foodWhy"></textarea><div class="row"><button class="primary" id="saveFoodBtn">儲存美食</button><button class="soft" id="cancelFoodBtn">取消</button></div></div><div id="foodList"></div></section>

<section id="announcements" class="panel">
  <div class="card">
    <h2>新增公佈欄公告</h2>
    <label>公告標題</label><input id="annTitle" placeholder="例如：明天集合時間提醒">
    <label>公告內容</label><textarea id="annBody" class="textareaSmall" placeholder="輸入要給使用者看的公告"></textarea>
    <label class="row"><input class="switch" id="annPinned" type="checkbox">置頂公告</label>
    <button class="primary" id="addAnnouncementBtn">＋ 發布到公佈欄</button>
  </div>
  <div class="card">
    <h2>新增投票</h2>
    <label>投票問題</label><input id="pollQuestion" placeholder="例如：晚餐想吃什麼？">
    <label>選項，一行一個</label><textarea id="pollOptions" placeholder="沙茶麵&#10;海鮮&#10;薑母鴨"></textarea>
    <button class="primary" id="addPollBtn">＋ 建立投票</button>
  </div>
  <div class="card">
    <h2>公佈欄公告列表</h2>
    <div id="announcementList"></div>
  </div>
  <div class="card">
    <h2>公佈欄投票列表</h2>
    <div id="pollAdminList"></div>
  </div>
</section>
</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const SUPABASE_URL = "https://ovprxrcvclejwjytvfra.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cHJ4cmN2Y2xlandqeXR2ZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDUyODksImV4cCI6MjA5ODEyMTI4OX0.i72mbwna6qTR0nvDybeVqZmBgtpC_BAYaEwHaqjWKzg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let TRIPS=[], CURRENT_TRIP=null, DATA={trip:{},days:[],foods:[],announcements:[],polls:[]};
function $(id){return document.getElementById(id)}
function publicLink(slug){return "https://beggar-site.vercel.app/"}
async function uploadFile(file, folder){const cleanName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");const path=`${folder}/${Date.now()}-${cleanName}`;const up=await sb.storage.from("trip-images").upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||"image/jpeg"});if(up.error){alert("圖片上傳失敗："+up.error.message);throw up.error}return sb.storage.from("trip-images").getPublicUrl(path).data.publicUrl}
function bindFile(fileId, previewId, cb){$(fileId).addEventListener("change",async()=>{const file=$(fileId).files[0];if(!file)return;const url=await uploadFile(file,fileId);$(previewId).src=url;$(previewId).style.display="block";cb(url);alert("圖片已上傳，記得按儲存。")})}
async function loadTrips(){const r=await sb.from("trips").select("*").order("created_at",{ascending:false});if(r.error)throw r.error;TRIPS=r.data||[];renderTrips();if(!CURRENT_TRIP&&TRIPS[0])await selectTrip(TRIPS[0].id)}
function copyTripLink(slug){
  const link=publicLink(slug);
  navigator.clipboard?.writeText(link).then(()=>alert("已複製觀看網址："+link)).catch(()=>prompt("複製這個觀看網址", link));
}
function renderTrips(){$("tripList").innerHTML=TRIPS.map(t=>`<div class="card item tripCard"><div class="listrow"><div><b>${t.name}</b> <span class="status">${t.status}</span> <span class="status">${t.public_enabled?'公開':'關閉'}</span><div class="muted">代號：${t.slug}｜密碼：<span class="codeText">${t.access_code||"未設定"}</span>｜${t.start_date||""}－${t.end_date||""}</div><div class="timeSmall">開放：${t.open_at||"未設定"}｜關閉：${t.close_at||"未設定"}</div><div class="muted tripLink">完整觀看網址：${publicLink(t.slug)}</div></div><div class="row"><button class="soft" data-select="${t.id}">管理</button><button class="soft" data-reset-trip="${t.id}">重設密碼/時間</button><button class="soft" data-copy="${t.slug}">複製連結</button><button class="primary" data-open="${t.id}">開放</button><button class="orange" data-end="${t.id}">結束旅程</button><button class="danger" data-close="${t.id}">關閉公開</button><button class="danger" data-delete-trip="${t.id}">刪除</button></div></div></div>`).join("")||'<div class="card"><div class="empty">尚未建立旅程。</div></div>';document.querySelectorAll("[data-select]").forEach(b=>b.onclick=()=>selectTrip(b.dataset.select));document.querySelectorAll("[data-reset-trip]").forEach(b=>b.onclick=()=>resetTripSettings(b.dataset.resetTrip));document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>copyTripLink(b.dataset.copy));document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.open,"active",true));document.querySelectorAll("[data-end]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.end,"ended",false));document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>setTripStatus(b.dataset.close,"closed",false));document.querySelectorAll("[data-delete-trip]").forEach(b=>b.onclick=()=>deleteTrip(b.dataset.deleteTrip))}
async function deleteTrip(id){
  const trip=TRIPS.find(t=>t.id===id);
  const name=trip?trip.name:"這趟旅程";
  if(!confirm("確定要刪除「"+name+"」？\n\n刪除後首頁、住宿、日期、行程、美食都會一起刪掉，無法復原。"))return;
  if(!confirm("最後確認：真的要永久刪除「"+name+"」嗎？"))return;
  const r=await sb.from("trips").delete().eq("id",id);
  if(r.error){alert("刪除失敗："+r.error.message);throw r.error}
  if(CURRENT_TRIP&&CURRENT_TRIP.id===id){CURRENT_TRIP=null;DATA={trip:{},days:[],foods:[]};$("currentTripTitle").textContent="尚未選擇旅程";}
  await loadTrips();
  alert("已刪除旅程");
}
async function createTrip(){
  try{
    const name=$("newTripName").value.trim();
    if(!name)return alert("請輸入旅程名稱");

    let slug=$("newTripSlug").value.trim();
    if(!slug){
      slug = name.toLowerCase().replace(/\s+/g,"-") + "-" + Date.now();
    }
    // 旅程代號只保留英文、數字、-、_
    slug = slug.replace(/[^a-zA-Z0-9_-]/g,"-");
    if(!slug)return alert("旅程代號不可為空，請輸入英文或數字");

    const accessCode = $("newTripCode").value.trim() || slug;

    const insertPayload={
      name:name,
      slug:slug,
      destination:$("newTripDestination").value || "",
      start_date:$("newTripStart").value || null,

function toDatetimeLocal(value){
  if(!value)return "";
  const d=new Date(value);
  if(Number.isNaN(d.getTime()))return "";
  const pad=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function addPoll(){
  try{
    if(!CURRENT_TRIP)return alert("請先選擇旅程");
    const question=$("pollQuestion").value.trim();

    // 支援 Enter 換行，也支援逗號、頓號、空白分隔
    const raw=$("pollOptions").value || "";
    const opts=raw
      .split(/\r?\n|,|，|、/)
      .map(x=>x.trim())
      .filter(Boolean);

    if(!question)return alert("請輸入投票問題");
    if(opts.length<2)return alert("至少要有兩個選項。請在「選項，一行一個」裡輸入，例如：\n沙茶麵\n海鮮\n薑母鴨");

    const pr=await sb.from("trip_polls").insert({
      trip_id:CURRENT_TRIP.id,
      question:question,
      is_active:true
    }).select().single();

    if(pr.error) throw pr.error;

    const rows=opts.map((option_text,i)=>({
      poll_id:pr.data.id,
      option_text:option_text,
      option_order:i
    }));

    const or=await sb.from("trip_poll_options").insert(rows);
    if(or.error) throw or.error;

    $("pollQuestion").value="";
    $("pollOptions").value="";
    await refreshTripData();
    alert("投票已建立。使用者端重新整理後會看到。");
  }catch(e){
    console.error("addPoll failed", e);
    alert("建立投票失敗：" + (e.message || JSON.stringify(e)) + "\n\n如果錯誤提到 trip_polls / trip_poll_options，請先執行 supabase_trips_v14_update.sql。");
  }
}

async function addDemoData(){
  try{
    if(!CURRENT_TRIP)return alert("請先選擇旅程");
    if(!confirm("要幫目前旅程加入公告、投票、日期、行程、美食測試資料嗎？"))return;

    const today = new Date().toISOString().slice(0,10);

    // 公告
    const ann = await sb.from("trip_announcements").insert({
      trip_id: CURRENT_TRIP.id,
      title: "測試公告：集合時間提醒",
      body: "這是一則測試公告。你可以在後台修改或刪除它，使用者端會在公佈欄看到。",
      is_active: true,
      is_pinned: true
    });
    if(ann.error) throw ann.error;

    // 投票
    const poll = await sb.from("trip_polls").insert({
      trip_id: CURRENT_TRIP.id,
      question: "測試投票：今晚想吃什麼？",
      is_active: true
    }).select().single();
    if(poll.error) throw poll.error;

    const opts = ["沙茶麵", "海鮮料理", "薑母鴨"];
    const optRows = opts.map((option_text,i)=>({
      poll_id: poll.data.id,
      option_text,
      option_order: i
    }));
    const optResult = await sb.from("trip_poll_options").insert(optRows);
    if(optResult.error) throw optResult.error;

    // 日期
    const day = await sb.from("trip_days").insert({
      trip_id: CURRENT_TRIP.id,
      day_order: DATA.days.length,
      date: today,
      title: "測試日期"
    }).select().single();
    if(day.error) throw day.error;

    // 美食
    const food = await sb.from("trip_foods").insert({
      trip_id: CURRENT_TRIP.id,
      food_order: DATA.foods.length,
      name: "測試美食：沙茶麵",
      story: "這是測試用的美食介紹，之後可以改成真正推薦的餐點。",
      why: "方便測試公佈欄、行程推薦美食與使用者端顯示。",
      taste: "濃郁、微辣",
      when_text: "午餐或晚餐"
    }).select().single();
    if(food.error) throw food.error;

    // 行程
    const item = await sb.from("trip_itinerary_items").insert({
      trip_id: CURRENT_TRIP.id,
      day_id: day.data.id,
      item_order: 0,
      time: "12:00",
      name: "測試行程：午餐集合",
      address: "廈門中山路步行街",
      tag: "美食",
      story: "這是測試用行程，確認使用者端能看到每日行程。",
      food: "推薦吃沙茶麵",
      food_id: food.data.id,
      nav_enabled: true,
      completed: false
    });
    if(item.error) throw item.error;

    await refreshTripData();
    alert("測試資料已加入。請到公佈欄、每日行程、美食管理查看，使用者端重新整理後也會看到。");
  }catch(e){
    console.error("addDemoData failed", e);
    alert("加入測試資料失敗：" + (e.message || JSON.stringify(e)) + "\n\n如果錯誤提到資料表不存在，請確認已執行 v14 / v7 相關 SQL。");
  }
}
