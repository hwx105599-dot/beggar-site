<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>我的旅行</title><style>

label{font-size:13px;font-weight:800;color:#344054}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-top:8px}.done{color:#067647;font-weight:800}

.panel{display:none}.panel.active{display:block}.thumb{width:90px;height:62px;object-fit:cover;border-radius:8px;background:#edf2f7}.listrow{display:flex;gap:12px;align-items:center;justify-content:space-between}.listleft{display:flex;gap:12px;align-items:center}.switch{width:auto;margin-right:6px}.warn{background:#fff7ed;color:#9a3412;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}
.success{background:#ecfdf3;color:#067647;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}.status{font-size:12px;padding:4px 8px;border-radius:999px;background:#f2f4f7;color:#344054}
@media(max-width:700px){.tabs{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.listrow{align-items:flex-start;display:block}.listleft{align-items:flex-start}.thumb{width:72px;height:56px}.foodGrid{grid-template-columns:1fr}}
.gallery{display:flex;gap:8px;overflow-x:auto;padding:8px 0}.gallery img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}.miniFood{display:flex;gap:10px;align-items:center;background:#f8fafc;border-radius:12px;padding:10px;margin-top:10px}.miniFood img{width:80px;height:60px;object-fit:cover;border-radius:8px}.galleryPreview{display:flex;gap:8px;overflow-x:auto;margin:8px 0}.galleryPreview img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}.loginBox{max-width:520px;margin:24px auto}.loginBox input{font-size:18px}.blocked{padding:28px;text-align:center}.codeText{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f2f4f7;padding:4px 8px;border-radius:8px}.timeSmall{font-size:12px;color:#667085}.noticeCard{border-left:5px solid #0f766e}.pollOption{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid #e5e7eb;border-radius:12px;padding:10px;margin:8px 0;background:#fff}.pollBar{height:8px;background:#e7f8f5;border-radius:999px;overflow:hidden;margin-top:6px}.pollBar span{display:block;height:100%;background:#0f766e}.smallBtn{padding:7px 10px;font-size:12px}.adminListTitle{font-weight:800;margin-bottom:4px}.announcementBody{white-space:pre-wrap}.textareaSmall{min-height:56px}</style></head><body>
<div id="loginBox" class="loginBox card"><div class="content"><h2>輸入旅程密碼</h2><p class="muted">請輸入管理員提供的旅程密碼。</p><input id="accessCodeInput" placeholder="旅程密碼"><button class="primary" id="accessBtn">開啟旅程</button><div id="loginMsg" class="warn" style="display:none"></div></div></div><div class="app" id="app" style="display:none"><div id="hero" class="hero"><div class="heroText"><h1 id="tripTitle">載入中...</h1><div id="tripDates"></div></div></div><main><section id="plan" class="screen active"><div id="hotelCard" class="card"></div><div id="announcementsBox"></div><div id="pollsBox"></div><div id="daybar" class="daybar"></div><div id="dayTitle" class="sectionTitle"></div><div id="planList"></div></section><section id="food" class="screen"><h2 class="sectionTitle">美食</h2><div id="foodGrid" class="foodGrid"></div></section><section id="info" class="screen"><h2 class="sectionTitle">航班與資料</h2><div id="infoList" class="topCards"></div></section></main><nav><div class="navin"><button class="tab active" data-screen="plan">🗓️<br>行程</button><button class="tab" data-screen="food">🍜<br>美食</button><button class="tab" data-screen="info">✈️<br>資料</button></div></nav></div><div id="modalMask" class="modalMask"><div class="modal"><img id="modalImg" src=""><div class="modalContent"><div class="modalHeader"><div><div id="modalTime" class="time"></div><h2 id="modalTitle" class="title"></h2><span id="modalTag" class="badge"></span></div><button id="closeBtn" class="close">✕</button></div><div id="modalStory" class="info"></div><div id="modalFood" class="info"></div><div id="modalActions" class="actions"></div></div></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
const SUPABASE_URL = "https://ovprxrcvclejwjytvfra.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cHJ4cmN2Y2xlandqeXR2ZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDUyODksImV4cCI6MjA5ODEyMTI4OX0.i72mbwna6qTR0nvDybeVqZmBgtpC_BAYaEwHaqjWKzg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let DATA = {trip:{},days:[],foods:[],announcements:[],polls:[]};
let selectedDay = 0;
function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>\"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function attr(s){return esc(s)}
function getSlug(){return new URLSearchParams(location.search).get("trip")||""}
function getAccessCode(){return sessionStorage.getItem("trip_access_code")||new URLSearchParams(location.search).get("code")||""}
async function loadCloudData(){
  const slug=getSlug();
  const code=getAccessCode();
  let tripRes;
  if(slug){
    tripRes=await sb.from("trips").select("*").eq("slug",slug).maybeSingle();
  }else{
    if(!code){
      DATA={trip:{title:"",dates:"",hotel:""},days:[],foods:[]};
      return;
    }
    tripRes=await sb.from("trips").select("*").eq("access_code",code).maybeSingle();
  }
  if(tripRes.error) throw tripRes.error;
  const trip=tripRes.data;
  if(!trip){DATA={trip:{title:"找不到旅程",dates:"",hotel:"密碼錯誤或旅程不存在。",blocked:true},days:[],foods:[]};return}
  const now=new Date();
  if(!trip.public_enabled || trip.status==="closed" || trip.status==="ended"){
    DATA={trip:{title:trip.name||"旅程未開放",dates:"",hotel:"這趟旅程目前未開放觀看。",blocked:true},days:[],foods:[]};return;
  }
  if(trip.open_at && now < new Date(trip.open_at)){
    DATA={trip:{title:trip.name||"尚未開放",dates:"",hotel:"這趟旅程還沒到開放時間。",blocked:true},days:[],foods:[]};return;
  }
  if(trip.close_at && now > new Date(trip.close_at)){
    DATA={trip:{title:trip.name||"旅程已結束",dates:"",hotel:"這趟旅程已超過開放時間。",blocked:true},days:[],foods:[]};return;
  }
  const siteRes=await sb.from("trip_site_settings").select("*").eq("trip_id",trip.id).maybeSingle();
  const daysRes=await sb.from("trip_days").select("*").eq("trip_id",trip.id).order("date").order("day_order");
  const itemsRes=await sb.from("trip_itinerary_items").select("*").eq("trip_id",trip.id).order("item_order");
  const foodsRes=await sb.from("trip_foods").select("*").eq("trip_id",trip.id).order("food_order");const annRes=await sb.from("trip_announcements").select("*").eq("trip_id",trip.id).eq("is_active",true).order("is_pinned",{ascending:false}).order("created_at",{ascending:false});const pollRes=await sb.from("trip_polls").select("*, trip_poll_options(*), trip_poll_votes(*)").eq("trip_id",trip.id).eq("is_active",true).order("created_at",{ascending:false});
  const site=siteRes.data||{};
  const days=(daysRes.data||[]).map(d=>({...d,items:[]}));
  const byId=Object.fromEntries(days.map(d=>[d.id,d]));
  (itemsRes.data||[]).forEach(x=>{if(byId[x.day_id])byId[x.day_id].items.push(x)});
  DATA={
    trip:{id:trip.id,slug:trip.slug,name:trip.name,status:trip.status,public_enabled:trip.public_enabled,title:site.title||trip.name,dates:site.dates||"",hotel:site.hotel||"",hotelAddress:site.hotel_address||"",hotelNavEnabled:site.hotel_nav_enabled!==false,mapProvider:site.map_provider||"amap",hero:site.hero_image||"",hotelImage:site.hotel_image||"",flightOut:{time:site.flight_out_time||"",route:site.flight_out_route||"",image:site.flight_out_image||""},flightBack:{time:site.flight_back_time||"",route:site.flight_back_route||"",image:site.flight_back_image||""}},
    days:days.map(d=>({id:d.id,date:d.date,title:d.title,items:d.items.map(x=>({id:x.id,time:x.time,name:x.name,address:x.address,tag:x.tag,image:x.image,imageUrls:x.image_urls||[],story:x.story,food:x.food,foodId:x.food_id,navEnabled:x.nav_enabled,completed:x.completed}))})),
    foods:(foodsRes.data||[]).map(x=>({id:x.id,name:x.name,image:x.image,imageUrls:x.image_urls||[],story:x.story,why:x.why,taste:x.taste,when:x.when_text}))
  };
}
function renderAll(){ $("hero").style.backgroundImage=DATA.trip.hero?`url('${DATA.trip.hero}')`:""; $("tripTitle").textContent=DATA.trip.title||"我的旅行"; $("tripDates").textContent=DATA.trip.dates||""; renderHotelCard(); renderAnnouncements(); renderPolls(); renderDays(); renderFoods(); renderInfo(); }
function renderHotelCard(){ const wrap=$("hotelCard"); wrap.innerHTML=`${DATA.trip.hotelImage?`<img src="${DATA.trip.hotelImage}" alt="住宿圖片">`:""}<div class="content"><b>住宿</b><div id="hotel" class="hotel">${esc(DATA.trip.hotel||"")}</div><div id="hotelActions" class="actions"></div></div>`; if(DATA.trip.hotelNavEnabled!==false&&DATA.trip.hotel){ $("hotelActions").innerHTML='<button class="btn primary" id="hotelNavBtn">開啟導航</button>';$("hotelNavBtn").onclick=()=>openNav(DATA.trip.hotelAddress||DATA.trip.hotel); } }

function getVoterKey(){
  let key=localStorage.getItem("trip_voter_key");
  if(!key){key=crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random();localStorage.setItem("trip_voter_key",key)}
  return key;
}
function renderAnnouncements(){
  const box=$("announcementsBox"); if(!box)return;
  box.innerHTML=(DATA.announcements||[]).map(a=>`<div class="card noticeCard"><div class="content"><b>${esc(a.title||"公告")}</b>${a.is_pinned?'<span class="badge">置頂</span>':''}<p class="announcementBody">${esc(a.body||"")}</p></div></div>`).join("");
}
function renderPolls(){
  const box=$("pollsBox"); if(!box)return;
  box.innerHTML=(DATA.polls||[]).map(p=>{
    const votes=p.trip_poll_votes||[];
    const voter=getVoterKey();
    const voted=votes.find(v=>v.voter_key===voter);
    const options=(p.trip_poll_options||[]).sort((a,b)=>(a.option_order||0)-(b.option_order||0));
    const total=votes.length||0;
    return `<div class="card"><div class="content"><b>投票：${esc(p.question)}</b>${options.map(o=>{
      const count=votes.filter(v=>v.option_id===o.id).length;
      const pct=total?Math.round(count/total*100):0;
      return `<div class="pollOption"><div style="flex:1"><div>${esc(o.option_text)}｜${count}票 ${pct}%</div><div class="pollBar"><span style="width:${pct}%"></span></div></div>${voted? (voted.option_id===o.id?'<span class="badge">已投</span>':'') : `<button class="primary smallBtn voteBtn" data-poll="${p.id}" data-option="${o.id}">投票</button>`}</div>`;
    }).join("")}</div></div>`;
  }).join("");
  document.querySelectorAll(".voteBtn").forEach(b=>b.onclick=()=>votePoll(Number(b.dataset.poll),Number(b.dataset.option)));
}
async function votePoll(pollId, optionId){
  const r=await sb.from("trip_poll_votes").insert({poll_id:pollId,option_id:optionId,voter_key:getVoterKey()});
  if(r.error){alert("投票失敗，可能你已經投過票。");return}
  await loadCloudData(); renderAll();
}

function renderDays(){ $("daybar").innerHTML=DATA.days.map((d,i)=>`<button class="day ${i===selectedDay?'active':''}" data-day="${i}">${esc(d.date)}<br><small>${esc(d.title)}</small></button>`).join(""); document.querySelectorAll(".day").forEach(b=>b.onclick=()=>{selectedDay=Number(b.dataset.day);renderDays()}); const d=DATA.days[selectedDay]; if(!d){$("dayTitle").textContent="";$("planList").innerHTML='<div class="card"><div class="empty">目前尚未新增行程，或這趟旅程未開放觀看。</div></div>';return;} $("dayTitle").textContent=`${d.date}｜${d.title||"未命名行程"}`; $("planList").innerHTML=d.items.length?d.items.map((x,i)=>`<article class="card">${x.image?`<img src="${x.image}" alt="${attr(x.name)}">`:""}<div class="content"><div class="time">${esc(x.time)}</div><h3 class="title">${esc(x.name)}</h3><span class="badge">${esc(x.tag)}</span><div class="brief">${esc(makeBrief(x))}</div><div class="actions"><button class="btn soft introBtn" data-index="${i}">查看介紹</button>${x.navEnabled===false?"":`<button class="btn primary navBtn" data-address="${attr(x.address)}">開啟導航</button>`}</div></div></article>`).join(""):'<div class="card"><div class="empty">這一天尚未新增行程。</div></div>'; document.querySelectorAll(".introBtn").forEach(b=>b.onclick=()=>openPlace(selectedDay,Number(b.dataset.index))); document.querySelectorAll(".navBtn").forEach(b=>b.onclick=()=>openNav(b.dataset.address)); }
function makeBrief(x){ if(x.food)return x.food; if(x.story)return x.story.slice(0,42)+(x.story.length>42?"...":""); return "點擊查看介紹。"; }
function renderFoods(){ $("foodGrid").innerHTML=DATA.foods.length?DATA.foods.map((x,i)=>`<article class="card food">${x.image?`<img src="${x.image}" alt="${attr(x.name)}">`:""}<div class="content"><h3 class="title">${esc(x.name)}</h3><span class="badge">${esc(x.taste)}</span><div class="brief">${esc((x.story||x.why||"").slice(0,42))}${(x.story||x.why||"").length>42?"...":""}</div><div class="actions"><button class="btn soft foodIntroBtn" data-food="${i}">查看美食介紹</button></div></div></article>`).join(""):'<div class="card"><div class="empty">目前尚未新增美食。</div></div>'; document.querySelectorAll(".foodIntroBtn").forEach(b=>b.onclick=()=>openFood(Number(b.dataset.food))); }
function renderInfo(){ $("infoList").innerHTML=`<div class="card flightCard">${DATA.trip.flightOut?.image?`<img src="${DATA.trip.flightOut.image}">`:""}<div class="content"><b>去程</b><p>${esc(DATA.trip.flightOut?.time)}<br>${esc(DATA.trip.flightOut?.route)}</p></div></div><div class="card flightCard">${DATA.trip.flightBack?.image?`<img src="${DATA.trip.flightBack.image}">`:""}<div class="content"><b>回程</b><p>${esc(DATA.trip.flightBack?.time)}<br>${esc(DATA.trip.flightBack?.route)}</p></div></div>`; }
function getItemImages(x){const arr=[];if(x.image)arr.push(x.image);(x.imageUrls||[]).forEach(u=>{if(u&&!arr.includes(u))arr.push(u)});return arr}
function getFoodImages(x){const arr=[];if(x.image)arr.push(x.image);(x.imageUrls||[]).forEach(u=>{if(u&&!arr.includes(u))arr.push(u)});return arr}
function getFoodById(id){return DATA.foods.find(f=>String(f.id)===String(id))}
function galleryHtml(images){return images.length>1?`<div class="gallery">${images.map(u=>`<img src="${u}">`).join("")}</div>`:""}
function openPlace(dayIndex,itemIndex){ const x=DATA.days[dayIndex].items[itemIndex]; const imgs=getItemImages(x);$("modalImg").src=imgs[0]||DATA.trip.hero||""; $("modalTime").textContent=x.time||""; $("modalTitle").textContent=x.name||""; $("modalTag").textContent=x.tag||""; $("modalStory").innerHTML=`<b>故事與特色</b>${galleryHtml(imgs)}<p>${esc(x.story||"尚未填寫介紹。")}</p>`; const linkedFood=getFoodById(x.foodId);
if(linkedFood){$("modalFood").innerHTML=`<b>推薦美食</b><div class="miniFood">${linkedFood.image?`<img src="${linkedFood.image}">`:""}<div><b>${esc(linkedFood.name)}</b><p>${esc(linkedFood.story||linkedFood.why||x.food||"")}</p></div></div>`;}else{$("modalFood").innerHTML=x.food?`<b>推薦吃什麼</b><p>${esc(x.food)}</p>`:"";} $("modalActions").innerHTML=""; if(x.navEnabled!==false){const btn=document.createElement("button");btn.className="btn primary";btn.textContent="開啟導航";btn.onclick=()=>openNav(x.address);$("modalActions").appendChild(btn)} showModal(); }
function openFood(i){ const x=DATA.foods[i]; const imgs=getFoodImages(x); $("modalImg").src=imgs[0]||DATA.trip.hero||""; $("modalTime").textContent=x.when||""; $("modalTitle").textContent=x.name||""; $("modalTag").textContent=x.taste||""; $("modalStory").innerHTML=`<b>美食特色</b>${galleryHtml(imgs)}<p>${esc(x.story||x.why||"尚未填寫介紹。")}</p>`; $("modalFood").innerHTML=`<b>適合時間</b><p>${esc(x.when||"")}</p>`; $("modalActions").innerHTML=""; showModal(); }
function showModal(){$("modalMask").classList.add("active");document.body.style.overflow="hidden"}
function hideModal(){$("modalMask").classList.remove("active");document.body.style.overflow=""}
function openNav(query){ const q=encodeURIComponent(query||""); if(!q)return; const provider=(DATA.trip&&DATA.trip.mapProvider)||"amap"; const url=provider==="google"?"https://www.google.com/maps/search/?api=1&query="+q:"https://uri.amap.com/search?keyword="+q; window.open(url,"_blank"); }
function bindTabs(){ document.querySelectorAll(".tab").forEach(t=>{t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));$(t.dataset.screen).classList.add("active");scrollTo(0,0)}}); }
async function openByCode(){
  const code=$("accessCodeInput").value.trim();
  if(!code){$("loginMsg").style.display="block";$("loginMsg").textContent="請輸入旅程密碼";return}
  sessionStorage.setItem("trip_access_code",code);
  await loadAndRender();
}
async function loadAndRender(){
  try{
    await loadCloudData();
    if(DATA.trip.blocked){
      $("loginBox").style.display="block";$("app").style.display="none";
      $("loginMsg").style.display="block";$("loginMsg").textContent=DATA.trip.hotel||"無法開啟旅程";
      return;
    }
    $("loginBox").style.display="none";$("app").style.display="block";
    renderAll();
  }catch(e){
    console.error(e);
    $("loginBox").style.display="block";$("app").style.display="none";
    $("loginMsg").style.display="block";$("loginMsg").textContent="雲端讀取失敗：" + (e.message||JSON.stringify(e));
  }
}
async function init(){
  bindTabs();
  $("modalMask").addEventListener("click",e=>{if(e.target.id==="modalMask")hideModal()});
  $("closeBtn").onclick=hideModal;
  $("accessBtn").onclick=openByCode;
  $("accessCodeInput").addEventListener("keydown",e=>{if(e.key==="Enter")openByCode()});
  if(getSlug() || getAccessCode()) await loadAndRender();
}
init();
</script></body></html>
