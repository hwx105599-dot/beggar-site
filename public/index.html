<style>

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let DATA={trip:{},days:[],foods:[],announcements:[],polls:[],feedback:[]},selectedDay=0;
function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function normalizeTimeValue(v){
  const s=String(v||"").trim();
  if(!s)return 999999;
  const colon=s.match(/(\d{1,2})\s*[:：點]\s*(\d{1,2})?/);
  if(colon){const h=Number(colon[1]||0),m=Number(colon[2]||0);return h*60+m;}
  const digits=s.replace(/\D/g,"");
  if(digits.length>=3){const h=Number(digits.slice(0,-2)),m=Number(digits.slice(-2));return h*60+m;}
  if(digits.length>0)return Number(digits)*60;
  return 999999;
}
function sortItineraryItems(arr){
  return (arr||[]).sort((a,b)=>normalizeTimeValue(a.time)-normalizeTimeValue(b.time)||((Number(a.item_order??0))-(Number(b.item_order??0)))||String(a.created_at||"").localeCompare(String(b.created_at||"")));
}
function getSlug(){return new URLSearchParams(location.search).get("trip")||""}
function getCode(){return localStorage.getItem("trip_access_code")||new URLSearchParams(location.search).get("code")||""}
function voterKey(){let k=localStorage.getItem("trip_voter_key");if(!k){k=crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random();localStorage.setItem("trip_voter_key",k)}return k}
function fitMode(v){return v==="contain"?"contain":"cover"}
function firstImage(x){return x?.image || (x?.imageUrls||[])[0] || ""}
function imgs(x){const a=[];if(x.image)a.push(x.image);(x.imageUrls||[]).forEach(u=>{if(u&&!a.includes(u))a.push(u)});return a}
function gallery(x){const a=imgs(x);return a.length>1?`<div class="gallery">${a.map(u=>`<img src="${u}" style="object-fit:${fitMode(x.imageFit)}">`).join("")}</div>`:""}
function coverTag(url,fit){return url?`<img class="cover" style="object-fit:${fitMode(fit)}" src="${url}">`:""}
async function findTrip(){const slug=getSlug(),code=getCode();if(slug){const r=await sb.from("trips").select("*").eq("slug",slug).maybeSingle();if(r.error)throw r.error;return r.data}if(!code)return null;let r=await sb.from("trips").select("*").eq("access_code",code).limit(1);if(r.error)throw r.error;if(r.data&&r.data[0])return r.data[0];r=await sb.from("trips").select("*").eq("slug",code).limit(1);if(r.error)throw r.error;return r.data&&r.data[0]?r.data[0]:null}
async function loadCloudData(){const trip=await findTrip();if(!trip){DATA={trip:{blocked:true,hotel:"找不到旅程，請確認密碼或旅程代號。"},days:[],foods:[],feedback:[]};return}const now=new Date();function block(msg){DATA={trip:{blocked:true,title:trip.name,hotel:msg},days:[],foods:[],feedback:[]}}if(trip.status==="closed")return block("這趟旅程目前已關閉公開觀看。");if(trip.status==="ended")return block("這趟旅程已結束，暫不開放觀看。");if(!trip.public_enabled)return block("這趟旅程尚未公開。請管理員開放觀看。");if(trip.open_at&&now<new Date(trip.open_at))return block("尚未到開放時間："+trip.open_at);if(trip.close_at&&now>new Date(trip.close_at))return block("已超過關閉時間："+trip.close_at);
const [site,days,items,foods,anns,polls,feedback]=await Promise.all([
sb.from("trip_site_settings").select("*").eq("trip_id",trip.id).maybeSingle(),
sb.from("trip_days").select("*").eq("trip_id",trip.id).order("date").order("day_order"),
sb.from("trip_itinerary_items").select("*").eq("trip_id",trip.id).order("item_order"),
sb.from("trip_foods").select("*").eq("trip_id",trip.id).order("food_order"),
sb.from("trip_announcements").select("*").eq("trip_id",trip.id).eq("is_active",true).order("is_pinned",{ascending:false}).order("created_at",{ascending:false}),
sb.from("trip_polls").select("*, trip_poll_options(*), trip_poll_votes(*)").eq("trip_id",trip.id).eq("is_active",true).order("created_at",{ascending:false}),
sb.from("trip_user_feedback").select("*").eq("trip_id",trip.id).eq("voter_key",voterKey())
]);[site,days,items,foods,anns,polls].forEach(r=>{if(r.error)throw r.error});const ds=(days.data||[]).map(d=>({...d,items:[]}));const by=Object.fromEntries(ds.map(d=>[d.id,d]));(items.data||[]).forEach(x=>{if(by[x.day_id])by[x.day_id].items.push(x)});ds.forEach(d=>sortItineraryItems(d.items));const s=site.data||{};DATA={trip:{id:trip.id,slug:trip.slug,name:trip.name,status:trip.status,title:s.title||trip.name,dates:s.dates||"",hotel:s.hotel||"",hotelAddress:s.hotel_address||"",hotelNavEnabled:s.hotel_nav_enabled!==false,mapProvider:s.map_provider||"amap",hero:s.hero_image||"",heroFit:s.hero_image_fit||"cover",hotelImage:s.hotel_image||"",hotelImageFit:s.hotel_image_fit||"cover",flightOut:{time:s.flight_out_time||"",route:s.flight_out_route||"",image:s.flight_out_image||"",imageFit:s.flight_out_image_fit||"contain"},flightBack:{time:s.flight_back_time||"",route:s.flight_back_route||"",image:s.flight_back_image||"",imageFit:s.flight_back_image_fit||"contain"}},days:ds.map(d=>({id:d.id,date:d.date,title:d.title,items:d.items.map(x=>({id:x.id,time:x.time,name:x.name,address:x.address,tag:x.tag,image:x.image,imageFit:x.image_fit||"cover",imageUrls:x.image_urls||[],story:x.story,food:x.food,foodId:x.food_id,navEnabled:x.nav_enabled,completed:x.completed}))})),foods:(foods.data||[]).map(f=>({id:f.id,name:f.name,image:f.image,imageFit:f.image_fit||"cover",imageUrls:f.image_urls||[],story:f.story,why:f.why,taste:f.taste,when:f.when_text})),announcements:anns.data||[],polls:polls.data||[],feedback:(feedback.data||[])}}
function fb(type,id){return(DATA.feedback||[]).find(f=>f.target_type===type&&String(f.target_id)===String(id))||{}}
function feedbackHtml(type,id){const f=fb(type,id),rating=f.rating||0;return `<div class="feedbackBox" data-fb-type="${type}" data-fb-id="${id}"><b>我的心得與星星</b><div class="stars">${[1,2,3,4,5].map(n=>`<button class="starBtn ${rating>=n?"active":""}" data-star="${n}">★</button>`).join("")}</div><div class="likeRow"><button class="soft smallBtn likeBtn ${f.liked?"active":""}">喜歡</button><button class="danger smallBtn dislikeBtn ${f.disliked?"active":""}">不喜歡</button></div><textarea class="fbNote" placeholder="寫下你的心得">${esc(f.note||"")}</textarea><button class="primary smallBtn saveFbBtn">儲存心得</button></div>`}
function bindFeedback(){document.querySelectorAll(".feedbackBox").forEach(box=>{let selected=Number(fb(box.dataset.fbType,box.dataset.fbId).rating||0),liked=box.querySelector(".likeBtn").classList.contains("active"),disliked=box.querySelector(".dislikeBtn").classList.contains("active");box.querySelectorAll(".starBtn").forEach(btn=>btn.onclick=()=>{selected=Number(btn.dataset.star);box.querySelectorAll(".starBtn").forEach(b=>b.classList.toggle("active",Number(b.dataset.star)<=selected))});box.querySelector(".likeBtn").onclick=()=>{liked=!liked;if(liked)disliked=false;box.querySelector(".likeBtn").classList.toggle("active",liked);box.querySelector(".dislikeBtn").classList.toggle("active",disliked)};box.querySelector(".dislikeBtn").onclick=()=>{disliked=!disliked;if(disliked)liked=false;box.querySelector(".dislikeBtn").classList.toggle("active",disliked);box.querySelector(".likeBtn").classList.toggle("active",liked)};box.querySelector(".saveFbBtn").onclick=()=>saveFeedback(box.dataset.fbType,box.dataset.fbId,selected,box.querySelector(".fbNote").value,liked,disliked)})}
async function saveFeedback(type,id,rating,note,liked,disliked){const r=await sb.from("trip_user_feedback").upsert({trip_id:DATA.trip.id,voter_key:voterKey(),target_type:type,target_id:String(id),rating:rating||null,note:note||"",liked:!!liked,disliked:!!disliked,updated_at:new Date().toISOString()},{onConflict:"trip_id,voter_key,target_type,target_id"});if(r.error)return alert("儲存心得失敗："+r.error.message);await loadCloudData();alert("心得已儲存")}
function renderAll(){$("hero").style.backgroundImage=DATA.trip.hero?`url("${DATA.trip.hero}")`:"";$("hero").style.backgroundSize=fitMode(DATA.trip.heroFit);$("tripTitle").textContent=DATA.trip.title||DATA.trip.name||"我的旅行";$("tripDates").textContent=DATA.trip.dates||"";renderHotel();renderDays();renderBulletin();renderFoods();renderInfo();renderDownloads();bindFeedback()}
function renderHotel(){$("hotelCard").innerHTML=`${coverTag(DATA.trip.hotelImage,DATA.trip.hotelImageFit)}<div class="content"><b>住宿</b><div class="muted">${esc(DATA.trip.hotel||"")}</div><div class="muted">${esc(DATA.trip.hotelAddress||"")}</div>${feedbackHtml("hotel",DATA.trip.id||"hotel")}</div>`}
function renderDays(){$("daybar").innerHTML=DATA.days.map((d,i)=>`<button class="day ${i===selectedDay?"active":""}" data-day="${i}">${esc(d.date)}｜${esc(d.title||"")}</button>`).join("");document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{selectedDay=Number(b.dataset.day);renderDays();bindFeedback()});const d=DATA.days[selectedDay];if(!d){$("dayTitle").textContent="";$("planList").innerHTML='<div class="card empty">目前尚未新增行程。</div>';return}$("dayTitle").textContent=`${d.date}｜${d.title||""}`;$("planList").innerHTML=d.items.length?d.items.map((it,i)=>`<div class="card">${coverTag(firstImage(it),it.imageFit)}<div class="content"><div class="time">${esc(it.time||"")}</div><h2>${esc(it.name||"")}</h2><span class="badge">${esc(it.tag||"")}</span><div class="muted">${esc(it.address||"")}</div><button class="soft detail" data-item="${i}">查看內容</button></div></div>`).join(""):'<div class="card empty">這一天沒有行程。</div>';document.querySelectorAll("[data-item]").forEach(b=>b.onclick=()=>openItem(Number(b.dataset.item)))}
function openItem(i){const it=DATA.days[selectedDay].items[i];$("modalImg").src=firstImage(it)||DATA.trip.hero||"";$("modalImg").style.objectFit=fitMode(it.imageFit||DATA.trip.heroFit);$("modalTime").textContent=it.time||"";$("modalTitle").textContent=it.name||"";$("modalTag").textContent=it.tag||"";$("modalStory").innerHTML=`${gallery(it)}<div class="muted">${esc(it.story||"")}</div>`;$("modalFood").innerHTML=(it.food?`<div class="feedbackBox"><b>推薦吃什麼</b><div>${esc(it.food)}</div></div>`:"")+feedbackHtml("itinerary",it.id);$("modalActions").innerHTML=it.navEnabled!==false?'<button class="primary" id="navBtn">開啟導航</button>':"";if($("navBtn"))$("navBtn").onclick=()=>openNav(it.address);$("modalMask").classList.add("active");bindFeedback()}
function renderBulletin(){renderAnnouncements();renderPolls()}
function renderAnnouncements(){$("announcementsBox").innerHTML=(DATA.announcements||[]).length?DATA.announcements.map(a=>`<div class="card noticeCard content"><b>${esc(a.title||"公告")}</b>${a.is_pinned?'<span class="badge">置頂</span>':''}<div class="muted announcementBody">${esc(a.body||"")}</div></div>`).join(""):'<div class="card empty">目前沒有公告。</div>'}

function roundedRect(ctx,x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.stroke()}}
function wrapLines(ctx,text,maxWidth){const raw=String(text||""),parts=raw.split(/\n/);const lines=[];parts.forEach(part=>{if(!part){lines.push("");return}let line="";for(const ch of part){const test=line+ch;if(ctx.measureText(test).width>maxWidth&&line){lines.push(line);line=ch}else line=test}if(line)lines.push(line)});return lines.length?lines:[""]}
function drawTextBlock(ctx,text,x,y,maxWidth,lineHeight,color,font,weight){ctx.fillStyle=color||"#1f2937";ctx.font=`${weight||"400"} ${font||"26px"} -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif`;const lines=wrapLines(ctx,text,maxWidth);lines.forEach((line,i)=>ctx.fillText(line,x,y+i*lineHeight));return lines.length*lineHeight}
function fitDrawImage(ctx,img,x,y,w,h,r,fit="cover"){ctx.save();roundedRect(ctx,x,y,w,h,r,"#ffffff");ctx.clip();const ir=img.width/img.height,br=w/h;let dw=w,dh=h,dx=x,dy=y;if(fitMode(fit)==="contain"){if(ir>br){dw=w;dh=w/ir;dy=y+(h-dh)/2}else{dh=h;dw=h*ir;dx=x+(w-dw)/2}}else{if(ir>br){dh=h;dw=h*ir;dx=x-(dw-w)/2}else{dw=w;dh=w/ir;dy=y-(dh-h)/2}}ctx.drawImage(img,dx,dy,dw,dh);ctx.restore()}

function lineCountFor(ctx,text,maxWidth,font){ctx.font=`400 ${font} -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif`;return wrapLines(ctx,text,maxWidth).length}
