<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的旅行</title>
<style>
:root{--p:#0f766e;--bg:#f4f7f7;--text:#1f2937;--muted:#667085;--line:#e5e7eb;--danger:#b42318}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text)}
.wrap,.app{max-width:900px;margin:auto;padding:18px 16px 96px}.card{background:white;border-radius:18px;box-shadow:0 4px 18px rgba(15,23,42,.06);overflow:hidden;margin-bottom:14px}.content{padding:15px}
h1{font-size:30px;margin:10px 0 16px}h2{margin:0 0 12px}.muted{color:#667085;font-size:14px;line-height:1.6}.warn{background:#fff7ed;color:#9a3412;padding:10px;border-radius:12px;font-size:13px;margin:8px 0;white-space:pre-wrap}.success{background:#ecfdf3;color:#067647;padding:10px;border-radius:12px;font-size:13px;margin:8px 0}
button,.btn{border:0;border-radius:11px;padding:10px 12px;font-weight:800;cursor:pointer}.primary{background:var(--p);color:white}.soft{background:#eef7f6;color:var(--p)}.danger{background:#fee4e2;color:#b42318}.gray{background:#f2f4f7;color:#344054}.orange{background:#fff7ed;color:#9a3412}.smallBtn{font-size:12px;padding:7px 10px}
input,textarea,select{width:100%;border:1px solid #d0d5dd;border-radius:10px;padding:10px;margin:5px 0 10px;font:inherit}textarea{min-height:76px}label{font-size:13px;font-weight:800;color:#344054}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0}.adminTab,.tab{background:white;color:#667085}.adminTab.active,.tab.active{background:var(--p);color:white}.panel,.screen{display:none}.panel.active,.screen.active{display:block}
.item{border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-top:10px;background:#fff}.listrow{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.status,.badge{font-size:12px;padding:4px 8px;border-radius:999px;background:#f2f4f7;color:#344054;display:inline-block;margin:2px}.codeText{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f2f4f7;padding:3px 8px;border-radius:8px}
.pick{display:flex;justify-content:center;align-items:center;height:72px;border:2px dashed #99d6cc;border-radius:14px;background:#f0fdfa;color:var(--p);font-weight:900;cursor:pointer}.preview{width:100%;max-height:260px;object-fit:cover;border-radius:12px;background:#edf2f7;margin:8px 0;display:none}.thumb{width:90px;height:62px;object-fit:cover;border-radius:8px;background:#edf2f7}.galleryPreview,.gallery{display:flex;gap:8px;overflow-x:auto;margin:8px 0}.galleryPreview img,.gallery img{width:110px;height:78px;object-fit:cover;border-radius:10px;background:#edf2f7}
.hero{height:280px;background:#0f766e center/cover no-repeat;position:relative}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.72))}.heroText{position:absolute;left:20px;right:20px;bottom:22px;color:white;z-index:1}.heroText h1{margin:0 0 6px;color:white}
nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:20}.navin{max-width:900px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.navin .tab{background:white;padding:8px 4px}
.card img.cover{width:100%;height:220px;object-fit:cover;background:#edf2f7}.sectionTitle{font-size:22px;margin:16px 4px 10px}.empty{padding:20px;color:#667085}
.modalMask{position:fixed;inset:0;background:rgba(15,23,42,.58);z-index:99;display:none;align-items:flex-end;justify-content:center}.modalMask.active{display:flex}.modal{background:white;width:min(900px,100%);max-height:88vh;overflow:auto;border-radius:22px 22px 0 0}.modal img{width:100%;height:260px;object-fit:cover;background:#edf2f7}.modalContent{padding:16px 16px 28px}.modalHeader{display:flex;justify-content:space-between}.close{border-radius:999px;background:#f2f4f7;color:#344054}
.feedbackBox,.noticeCard{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-top:12px}.stars{display:flex;gap:6px;margin:8px 0}.starBtn{font-size:22px;background:#eef7f6;color:#667085;padding:6px 9px}.starBtn.active{background:var(--p);color:white}.likeRow{display:flex;gap:8px;margin:8px 0}.likeRow button.active{outline:2px solid var(--p)}.announcementBody{white-space:pre-wrap}.pollOption{border:1px solid #e5e7eb;border-radius:12px;padding:10px;margin:8px 0}.pollBar{height:8px;background:#e7f8f5;border-radius:999px;overflow:hidden;margin-top:6px}.pollBar span{display:block;height:100%;background:var(--p)}
.loginBox{max-width:520px;margin:26px auto}.logoutBar{position:fixed;right:8px;top:8px;z-index:30}.downloadBox{padding:14px}.detailBox{display:none;border-top:1px solid #e5e7eb;margin-top:10px;padding-top:10px}.detailBox.show{display:block}
@media(max-width:760px){.grid2{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}.listrow{display:block}.navin{grid-template-columns:repeat(5,1fr)}.wrap,.app{padding-left:12px;padding-right:12px}h1{font-size:26px}}
</style>
</head>
<body>
<div class="logoutBar" id="logoutBar" style="display:none"><button class="gray smallBtn" id="logoutBtn">登出</button></div>
<div id="loginBox" class="loginBox card"><div class="content">
  <h2>輸入旅程密碼</h2>
  <p class="muted">請輸入管理員提供的旅程密碼，也可以輸入旅程代號測試。</p>
  <input id="accessCodeInput" placeholder="旅程密碼">
  <button class="primary" id="accessBtn">開啟旅程</button>
  <div id="loginMsg" class="warn" style="display:none"></div>
  <div id="loginStatus" class="muted"></div>
</div></div>

<div class="app" id="app" style="display:none">
  <div id="hero" class="hero"><div class="heroText"><h1 id="tripTitle">我的旅行</h1><div id="tripDates"></div></div></div>
  <main>
    <section id="plan" class="screen active"><div id="hotelCard" class="card"></div><div id="daybar" class="row"></div><div id="dayTitle" class="sectionTitle"></div><div id="planList"></div></section>
    <section id="bulletin" class="screen"><h2 class="sectionTitle">公佈欄</h2><div id="announcementsBox"></div><div id="pollsBox"></div></section>
    <section id="food" class="screen"><h2 class="sectionTitle">美食</h2><div id="foodGrid"></div></section>
    <section id="info" class="screen"><h2 class="sectionTitle">航班與資料</h2><div id="infoList"></div></section>
    <section id="download" class="screen"><h2 class="sectionTitle">下載可瀏覽電子檔</h2><div class="card downloadBox"><p class="muted">下載一個只讀版 HTML 電子檔，可以打開點選查看，但不能修改。</p><button class="primary" id="downloadTripBtn">下載只讀電子檔</button></div></section>
  </main>
  <nav><div class="navin">
    <button class="tab active" data-screen="plan">🗓️<br>行程</button>
    <button class="tab" data-screen="bulletin">📢<br>公佈欄</button>
    <button class="tab" data-screen="food">🍜<br>美食</button>
    <button class="tab" data-screen="info">✈️<br>資料</button>
    <button class="tab" data-screen="download">⬇️<br>下載</button>
  </div></nav>
</div>

<div id="modalMask" class="modalMask"><div class="modal"><img id="modalImg" src=""><div class="modalContent"><div class="modalHeader"><div><div id="modalTime" class="time"></div><h2 id="modalTitle"></h2><span id="modalTag" class="badge"></span></div><button id="closeBtn" class="close">✕</button></div><div id="modalStory"></div><div id="modalFood"></div><div id="modalActions" class="row"></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://ovprxrcvclejwjytvfra.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92cHJ4cmN2Y2xlandqeXR2ZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDUyODksImV4cCI6MjA5ODEyMTI4OX0.i72mbwna6qTR0nvDybeVqZmBgtpC_BAYaEwHaqjWKzg";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let DATA={trip:{},days:[],foods:[],announcements:[],polls:[],feedback:[]},selectedDay=0;
function $(id){return document.getElementById(id)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function getSlug(){return new URLSearchParams(location.search).get("trip")||""}
function getCode(){return localStorage.getItem("trip_access_code")||new URLSearchParams(location.search).get("code")||""}
function voterKey(){let k=localStorage.getItem("trip_voter_key");if(!k){k=crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random();localStorage.setItem("trip_voter_key",k)}return k}
function imgs(x){const a=[];if(x.image)a.push(x.image);(x.imageUrls||[]).forEach(u=>{if(u&&!a.includes(u))a.push(u)});return a}
function gallery(x){const a=imgs(x);return a.length>1?`<div class="gallery">${a.map(u=>`<img src="${u}">`).join("")}</div>`:""}
async function findTrip(){const slug=getSlug(),code=getCode();if(slug){const r=await sb.from("trips").select("*").eq("slug",slug).maybeSingle();if(r.error)throw r.error;return r.data}if(!code)return null;let r=await sb.from("trips").select("*").eq("access_code",code).limit(1);if(r.error)throw r.error;if(r.data&&r.data[0])return r.data[0];r=await sb.from("trips").select("*").eq("slug",code).limit(1);if(r.error)throw r.error;return r.data&&r.data[0]?r.data[0]:null}
async function loadCloudData(){const trip=await findTrip();if(!trip){DATA={trip:{blocked:true,hotel:"找不到旅程，請確認密碼或旅程代號。"},days:[],foods:[],feedback:[]};return}const now=new Date();function block(msg){DATA={trip:{blocked:true,title:trip.name,hotel:msg},days:[],foods:[],feedback:[]}}if(trip.status==="closed")return block("這趟旅程目前已關閉公開觀看。");if(trip.status==="ended")return block("這趟旅程已結束，暫不開放觀看。");if(!trip.public_enabled)return block("這趟旅程尚未公開。請管理員開放觀看。");if(trip.open_at&&now<new Date(trip.open_at))return block("尚未到開放時間："+trip.open_at);if(trip.close_at&&now>new Date(trip.close_at))return block("已超過關閉時間："+trip.close_at);
const [site,days,items,foods,anns,polls,feedback]=await Promise.all([
sb.from("trip_site_settings").select("*").eq("trip_id",trip.id).maybeSingle(),
sb.from("trip_days").select("*").eq("trip_id",trip.id).order("date").order("day_order"),
sb.from("trip_itinerary_items").select("*").eq("trip_id",trip.id).order("item_order"),
sb.from("trip_foods").select("*").eq("trip_id",trip.id).order("food_order"),
sb.from("trip_announcements").select("*").eq("trip_id",trip.id).eq("is_active",true).order("is_pinned",{ascending:false}).order("created_at",{ascending:false}),
sb.from("trip_polls").select("*, trip_poll_options(*), trip_poll_votes(*)").eq("trip_id",trip.id).eq("is_active",true).order("created_at",{ascending:false}),
sb.from("trip_user_feedback").select("*").eq("trip_id",trip.id).eq("voter_key",voterKey())
]);[site,days,items,foods,anns,polls].forEach(r=>{if(r.error)throw r.error});const ds=(days.data||[]).map(d=>({...d,items:[]}));const by=Object.fromEntries(ds.map(d=>[d.id,d]));(items.data||[]).forEach(x=>{if(by[x.day_id])by[x.day_id].items.push(x)});const s=site.data||{};DATA={trip:{id:trip.id,slug:trip.slug,name:trip.name,status:trip.status,title:s.title||trip.name,dates:s.dates||"",hotel:s.hotel||"",hotelAddress:s.hotel_address||"",hotelNavEnabled:s.hotel_nav_enabled!==false,mapProvider:s.map_provider||"amap",hero:s.hero_image||"",hotelImage:s.hotel_image||"",flightOut:{time:s.flight_out_time||"",route:s.flight_out_route||"",image:s.flight_out_image||""},flightBack:{time:s.flight_back_time||"",route:s.flight_back_route||"",image:s.flight_back_image||""}},days:ds.map(d=>({id:d.id,date:d.date,title:d.title,items:d.items.map(x=>({id:x.id,time:x.time,name:x.name,address:x.address,tag:x.tag,image:x.image,imageUrls:x.image_urls||[],story:x.story,food:x.food,foodId:x.food_id,navEnabled:x.nav_enabled,completed:x.completed}))})),foods:(foods.data||[]).map(f=>({id:f.id,name:f.name,image:f.image,imageUrls:f.image_urls||[],story:f.story,why:f.why,taste:f.taste,when:f.when_text})),announcements:anns.data||[],polls:polls.data||[],feedback:(feedback.data||[])}}
function fb(type,id){return(DATA.feedback||[]).find(f=>f.target_type===type&&String(f.target_id)===String(id))||{}}
function feedbackHtml(type,id){const f=fb(type,id),rating=f.rating||0;return `<div class="feedbackBox" data-fb-type="${type}" data-fb-id="${id}"><b>我的心得與星星</b><div class="stars">${[1,2,3,4,5].map(n=>`<button class="starBtn ${rating>=n?"active":""}" data-star="${n}">★</button>`).join("")}</div><div class="likeRow"><button class="soft smallBtn likeBtn ${f.liked?"active":""}">喜歡</button><button class="danger smallBtn dislikeBtn ${f.disliked?"active":""}">不喜歡</button></div><textarea class="fbNote" placeholder="寫下你的心得">${esc(f.note||"")}</textarea><button class="primary smallBtn saveFbBtn">儲存心得</button></div>`}
function bindFeedback(){document.querySelectorAll(".feedbackBox").forEach(box=>{let selected=Number(fb(box.dataset.fbType,box.dataset.fbId).rating||0),liked=box.querySelector(".likeBtn").classList.contains("active"),disliked=box.querySelector(".dislikeBtn").classList.contains("active");box.querySelectorAll(".starBtn").forEach(btn=>btn.onclick=()=>{selected=Number(btn.dataset.star);box.querySelectorAll(".starBtn").forEach(b=>b.classList.toggle("active",Number(b.dataset.star)<=selected))});box.querySelector(".likeBtn").onclick=()=>{liked=!liked;if(liked)disliked=false;box.querySelector(".likeBtn").classList.toggle("active",liked);box.querySelector(".dislikeBtn").classList.toggle("active",disliked)};box.querySelector(".dislikeBtn").onclick=()=>{disliked=!disliked;if(disliked)liked=false;box.querySelector(".dislikeBtn").classList.toggle("active",disliked);box.querySelector(".likeBtn").classList.toggle("active",liked)};box.querySelector(".saveFbBtn").onclick=()=>saveFeedback(box.dataset.fbType,box.dataset.fbId,selected,box.querySelector(".fbNote").value,liked,disliked)})}
async function saveFeedback(type,id,rating,note,liked,disliked){const r=await sb.from("trip_user_feedback").upsert({trip_id:DATA.trip.id,voter_key:voterKey(),target_type:type,target_id:String(id),rating:rating||null,note:note||"",liked:!!liked,disliked:!!disliked,updated_at:new Date().toISOString()},{onConflict:"trip_id,voter_key,target_type,target_id"});if(r.error)return alert("儲存心得失敗："+r.error.message);await loadCloudData();alert("心得已儲存")}
function renderAll(){$("hero").style.backgroundImage=DATA.trip.hero?`url("${DATA.trip.hero}")`:"";$("tripTitle").textContent=DATA.trip.title||DATA.trip.name||"我的旅行";$("tripDates").textContent=DATA.trip.dates||"";renderHotel();renderDays();renderBulletin();renderFoods();renderInfo();bindFeedback()}
function renderHotel(){$("hotelCard").innerHTML=`${DATA.trip.hotelImage?`<img class="cover" src="${DATA.trip.hotelImage}">`:""}<div class="content"><b>住宿</b><div class="muted">${esc(DATA.trip.hotel||"")}</div>${feedbackHtml("hotel",DATA.trip.id||"hotel")}</div>`}
function renderDays(){$("daybar").innerHTML=DATA.days.map((d,i)=>`<button class="day ${i===selectedDay?"active":""}" data-day="${i}">${esc(d.date)}｜${esc(d.title||"")}</button>`).join("");document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{selectedDay=Number(b.dataset.day);renderDays();bindFeedback()});const d=DATA.days[selectedDay];if(!d){$("dayTitle").textContent="";$("planList").innerHTML='<div class="card empty">目前尚未新增行程。</div>';return}$("dayTitle").textContent=`${d.date}｜${d.title||""}`;$("planList").innerHTML=d.items.length?d.items.map((it,i)=>`<div class="card">${it.image?`<img class="cover" src="${it.image}">`:""}<div class="content"><div class="time">${esc(it.time||"")}</div><h2>${esc(it.name||"")}</h2><span class="badge">${esc(it.tag||"")}</span><div class="muted">${esc(it.address||"")}</div><button class="soft detail" data-item="${i}">查看內容</button></div></div>`).join(""):'<div class="card empty">這一天沒有行程。</div>';document.querySelectorAll("[data-item]").forEach(b=>b.onclick=()=>openItem(Number(b.dataset.item)))}
function openItem(i){const it=DATA.days[selectedDay].items[i];$("modalImg").src=it.image||DATA.trip.hero||"";$("modalTime").textContent=it.time||"";$("modalTitle").textContent=it.name||"";$("modalTag").textContent=it.tag||"";$("modalStory").innerHTML=`${gallery(it)}<div class="muted">${esc(it.story||"")}</div>`;$("modalFood").innerHTML=(it.food?`<div class="feedbackBox"><b>推薦吃什麼</b><div>${esc(it.food)}</div></div>`:"")+feedbackHtml("itinerary",it.id);$("modalActions").innerHTML=it.navEnabled!==false?'<button class="primary" id="navBtn">開啟導航</button>':"";if($("navBtn"))$("navBtn").onclick=()=>openNav(it.address);$("modalMask").classList.add("active");bindFeedback()}
function renderBulletin(){renderAnnouncements();renderPolls()}
function renderAnnouncements(){$("announcementsBox").innerHTML=(DATA.announcements||[]).length?DATA.announcements.map(a=>`<div class="card noticeCard content"><b>${esc(a.title||"公告")}</b>${a.is_pinned?'<span class="badge">置頂</span>':''}<div class="muted announcementBody">${esc(a.body||"")}</div></div>`).join(""):'<div class="card empty">目前沒有公告。</div>'}
function renderPolls(){$("pollsBox").innerHTML=(DATA.polls||[]).length?DATA.polls.map(p=>{const votes=p.trip_poll_votes||[],voted=votes.find(v=>v.voter_key===voterKey()),opts=(p.trip_poll_options||[]).sort((a,b)=>(a.option_order||0)-(b.option_order||0)),total=votes.length;return `<div class="card content"><b>投票：${esc(p.question)}</b>${opts.map(o=>{const c=votes.filter(v=>v.option_id===o.id).length,pct=total?Math.round(c/total*100):0;return `<div class="pollOption"><div>${esc(o.option_text)}｜${c}票 ${pct}%</div><div class="pollBar"><span style="width:${pct}%"></span></div>${voted?(voted.option_id===o.id?'<span class="badge">已投</span>':''):`<button class="primary smallBtn voteBtn" data-poll="${p.id}" data-option="${o.id}">投票</button>`}</div>`}).join("")}</div>`}).join(""):'<div class="card empty">目前沒有投票。</div>';document.querySelectorAll(".voteBtn").forEach(b=>b.onclick=()=>vote(Number(b.dataset.poll),Number(b.dataset.option)))}
async function vote(poll_id,option_id){const r=await sb.from("trip_poll_votes").insert({poll_id,option_id,voter_key:voterKey()});if(r.error)return alert("投票失敗，可能已投過。");await loadCloudData();renderAll()}
function renderFoods(){$("foodGrid").innerHTML=DATA.foods.length?DATA.foods.map((f,i)=>`<div class="card">${f.image?`<img class="cover" src="${f.image}">`:""}<div class="content"><h2>${esc(f.name)}</h2><span class="badge">${esc(f.taste||"")}</span><div class="muted">${esc(f.when||"")}</div><button class="soft" data-food="${i}">查看內容</button></div></div>`).join(""):'<div class="card empty">沒有美食資料。</div>';document.querySelectorAll("[data-food]").forEach(b=>b.onclick=()=>openFood(Number(b.dataset.food)))}
function openFood(i){const f=DATA.foods[i];$("modalImg").src=f.image||DATA.trip.hero||"";$("modalTime").textContent=f.when||"";$("modalTitle").textContent=f.name||"";$("modalTag").textContent=f.taste||"";$("modalStory").innerHTML=`${gallery(f)}<div class="muted">${esc(f.story||f.why||"")}</div>`;$("modalFood").innerHTML=feedbackHtml("food",f.id);$("modalActions").innerHTML="";$("modalMask").classList.add("active");bindFeedback()}
function renderInfo(){$("infoList").innerHTML=`<div class="card content"><b>去程</b><div class="muted">${esc(DATA.trip.flightOut?.time||"")}<br>${esc(DATA.trip.flightOut?.route||"")}</div></div><div class="card content"><b>回程</b><div class="muted">${esc(DATA.trip.flightBack?.time||"")}<br>${esc(DATA.trip.flightBack?.route||"")}</div></div>`}
function openNav(q){if(!q)return;const u=DATA.trip.mapProvider==="google"?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`:`https://uri.amap.com/search?keyword=${encodeURIComponent(q)}`;open(u,"_blank")}
function logoutTrip(){localStorage.removeItem("trip_access_code");location.reload()}
async function openByCode(){const code=$("accessCodeInput").value.trim();if(!code){$("loginMsg").style.display="block";$("loginMsg").textContent="請輸入旅程密碼";return}$("loginStatus").textContent="正在連線...";localStorage.setItem("trip_access_code",code);await loadAndRender()}
async function loadAndRender(){try{await loadCloudData();if(DATA.trip.blocked){$("loginBox").style.display="block";$("app").style.display="none";$("logoutBar").style.display="none";$("loginMsg").style.display="block";$("loginMsg").textContent=DATA.trip.hotel||"無法開啟旅程";$("loginStatus").textContent="";return}$("loginBox").style.display="none";$("app").style.display="block";$("logoutBar").style.display="block";$("loginMsg").style.display="none";$("loginStatus").textContent="";renderAll()}catch(e){console.error(e);$("loginMsg").style.display="block";$("loginMsg").textContent="雲端讀取失敗："+(e.message||JSON.stringify(e));$("loginStatus").textContent=""}}
function downloadTripRecord(){const data=JSON.parse(JSON.stringify(DATA));const safe=JSON.stringify(data).replace(/</g,"\\u003c");const html=`<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(DATA.trip.title||"我的旅行")}</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#f4f7f7;color:#1f2937;margin:0}.wrap{max-width:820px;margin:auto;padding:16px}.card{background:white;border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 4px 18px rgba(15,23,42,.06)}img{max-width:100%;border-radius:12px}.muted{color:#667085}.badge{background:#e7f8f5;color:#0f766e;padding:4px 8px;border-radius:999px}</style></head><body><div class="wrap" id="root"></div><script>const DATA=${safe};function e(s){return String(s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]))}function render(){document.getElementById("root").innerHTML='<h1>'+e(DATA.trip.title||DATA.trip.name||"我的旅行")+'</h1><div class="muted">'+e(DATA.trip.dates||"")+'</div><div class="card"><h2>住宿</h2>'+ (DATA.trip.hotelImage?'<img src="'+DATA.trip.hotelImage+'">':'') + '<p>'+e(DATA.trip.hotel||"")+'</p></div><h2>行程</h2>'+DATA.days.map(d=>'<div class="card"><h3>'+e(d.date)+'｜'+e(d.title||"")+'</h3>'+d.items.map(it=>'<p><b>'+e(it.time||"")+' '+e(it.name||"")+'</b><br>'+e(it.story||"")+'</p>').join('')+'</div>').join('')+'<h2>美食</h2>'+DATA.foods.map(f=>'<div class="card">'+(f.image?'<img src="'+f.image+'">':'')+'<h3>'+e(f.name||"")+'</h3><p>'+e(f.story||f.why||"")+'</p></div>').join('')+'<h2>心得</h2>'+DATA.feedback.map(f=>'<div class="card"><span class="badge">'+e(f.target_type)+'</span><p>'+e(f.rating||"")+' 星</p><p>'+e(f.note||"")+'</p></div>').join('')}render();<\/script></div></body></html>`;const blob=new Blob([html],{type:"text/html;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(DATA.trip.title||"我的旅行")+"-只讀電子檔.html";a.click();URL.revokeObjectURL(a.href)}
function bindTabs(){document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));$(t.dataset.screen).classList.add("active");scrollTo(0,0)})}
async function init(){bindTabs();$("modalMask").onclick=e=>{if(e.target.id==="modalMask")$("modalMask").classList.remove("active")};$("closeBtn").onclick=()=>$("modalMask").classList.remove("active");$("accessBtn").onclick=openByCode;$("accessCodeInput").onkeydown=e=>{if(e.key==="Enter")openByCode()};$("logoutBtn").onclick=logoutTrip;$("downloadTripBtn").onclick=downloadTripRecord;const code=getCode();if(code){$("accessCodeInput").value=code;await loadAndRender()}}
init();
</script>
</body>
</html>
